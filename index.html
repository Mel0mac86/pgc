<title>Macro AI — Menù Nutrizionale</title>
<style>
:root{
  --bg:#0a0a0a; --card:#161616; --card2:#1f1f1f; --line:#262626;
  --txt:#f5f5f5; --muted:#8a8a8a; --accent:#34d399; --accent2:#22d3ee;
  --pro:#60a5fa; --car:#fbbf24; --fat:#f472b6; --cal:#34d399;
  --danger:#f87171; --warn:#fbbf24;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:520px;margin:0 auto;position:relative;background:var(--bg)}

/* Header */
header{padding:max(14px,env(safe-area-inset-top)) 18px 12px;background:linear-gradient(180deg,#111,#0a0a0a);border-bottom:1px solid var(--line);flex-shrink:0}
.htop{display:flex;align-items:center;justify-content:space-between}
header h1{font-size:19px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.logo{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:15px}
.gear{background:var(--card2);border:none;color:var(--txt);width:36px;height:36px;border-radius:11px;font-size:17px;display:flex;align-items:center;justify-content:center}

/* Content */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.screen{display:none;animation:fade .25s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Bottom nav */
.nav{display:flex;background:#0d0d0d;border-top:1px solid var(--line);padding:8px 8px max(8px,env(safe-area-inset-bottom));flex-shrink:0}
.nav button{flex:1;background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;border-radius:10px;transition:.15s}
.nav button .ic{font-size:20px}
.nav button.active{color:var(--accent)}

/* Cards & generic */
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
.card h2{font-size:16px;font-weight:700;margin-bottom:4px}
.card .sub{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.btn{display:block;width:100%;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04130d;text-align:center;cursor:pointer}
.btn:active{transform:scale(.98)}
.btn.sec{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--txt)}
.btn.danger{background:rgba(248,113,113,.12);color:var(--danger);border:1px solid rgba(248,113,113,.3)}
.btn.sm{padding:9px 14px;font-size:13px;width:auto;display:inline-block;border-radius:11px}
.row{display:flex;gap:10px}
.row .btn{flex:1}

/* Inputs */
label.fld{display:block;margin-bottom:14px}
label.fld .lab{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:7px;display:block}
label.fld .hint{font-size:11.5px;color:var(--muted);font-weight:400}
input[type=text],input[type=number],textarea,select{width:100%;padding:13px 14px;background:var(--card2);border:1px solid var(--line);border-radius:12px;color:var(--txt);font-size:15px;font-family:inherit;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:64px;line-height:1.5}
.stepper{display:flex;align-items:center;gap:14px}
.stepper button{width:42px;height:42px;border-radius:12px;background:var(--card2);border:1px solid var(--line);color:var(--txt);font-size:22px;font-weight:700;flex-shrink:0}
.stepper .val{flex:1;text-align:center;font-size:24px;font-weight:800}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:9px 14px;background:var(--card2);border:1px solid var(--line);border-radius:20px;font-size:13px;font-weight:600;color:var(--muted)}
.chip.on{background:var(--accent);color:#04130d;border-color:var(--accent)}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:13px 0}
.toggle .tlab{font-size:14px;font-weight:600}
.sw{width:50px;height:30px;border-radius:30px;background:var(--card2);border:1px solid var(--line);position:relative;flex-shrink:0;transition:.2s}
.sw.on{background:var(--accent);border-color:var(--accent)}
.sw::after{content:'';position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.2s}
.sw.on::after{left:22px}

/* Onboarding */
.ob-prog{display:flex;gap:5px;margin-bottom:20px}
.ob-prog span{flex:1;height:4px;border-radius:4px;background:var(--card2)}
.ob-prog span.done{background:var(--accent)}
.ob-step{display:none}
.ob-step.active{display:block;animation:fade .25s}
.ob-emoji{font-size:38px;margin-bottom:10px}
.ob-step h2{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.ob-step p.q{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:20px}

/* Macro pills */
.macro-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.mp{background:var(--card2);border-radius:12px;padding:10px 6px;text-align:center}
.mp .v{font-size:17px;font-weight:800}
.mp .l{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.mp.cal .v{color:var(--cal)} .mp.pro .v{color:var(--pro)} .mp.car .v{color:var(--car)} .mp.fat .v{color:var(--fat)}

/* Day cards */
.daysel{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;margin-bottom:4px;-webkit-overflow-scrolling:touch}
.daysel::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;padding:9px 13px;border-radius:12px;background:var(--card2);border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--muted);position:relative;text-align:center;min-width:52px}
.dpill .dd{font-size:10px;font-weight:600;color:var(--muted);display:block}
.dpill.on{background:var(--accent);color:#04130d;border-color:var(--accent)}
.dpill.on .dd{color:#04130d}
.dpill .tdot{position:absolute;top:5px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--accent2)}

.daytitle{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.daytitle h2{font-size:20px;font-weight:800}
.daytag{font-size:11px;font-weight:700;padding:4px 9px;border-radius:8px;background:rgba(52,211,153,.14);color:var(--accent)}
.daytag.rest{background:rgba(96,165,250,.14);color:var(--pro)}
.daytag.special{background:rgba(244,114,182,.14);color:var(--fat)}

/* Target bar */
.tgt{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:14px}
.tgt-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.tgt-h .tt{font-size:12px;color:var(--muted);font-weight:600}
.bar{height:8px;border-radius:8px;background:var(--card2);overflow:hidden;margin:4px 0 2px}
.bar>i{display:block;height:100%;border-radius:8px;transition:.4s}
.barlabel{display:flex;justify-content:space-between;font-size:11px;margin-bottom:8px}
.barlabel b{font-weight:700}

/* Meal card */
.meal{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden}
.meal-h{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;background:var(--card)}
.meal-h .mt{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.meal-h .mc{font-size:12px;color:var(--muted);font-weight:600}
.meal.cheat .meal-h{background:linear-gradient(90deg,rgba(244,114,182,.12),transparent)}
.cheatbadge{font-size:10px;font-weight:800;padding:3px 7px;border-radius:7px;background:var(--fat);color:#1a0410}
.food{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-top:1px solid var(--line)}
.food .fi{flex:1;min-width:0}
.food .fn{font-size:14px;font-weight:600}
.food .fg{font-size:11.5px;color:var(--muted);margin-top:2px}
.food .fmac{display:flex;gap:7px;margin-top:5px;font-size:10.5px;font-weight:700}
.food .fmac .p{color:var(--pro)} .food .fmac .c{color:var(--car)} .food .fmac .f{color:var(--fat)} .food .fmac .k{color:var(--cal)}
.food .fedit{background:var(--card2);border:1px solid var(--line);color:var(--muted);width:32px;height:32px;border-radius:10px;font-size:14px;flex-shrink:0;margin-left:8px}
.meal-foot{display:flex;gap:8px;padding:10px 15px;border-top:1px solid var(--line)}
.meal-foot button{flex:1;background:var(--card2);border:1px solid var(--line);color:var(--txt);padding:9px;border-radius:10px;font-size:12px;font-weight:600}

/* Chat / Coach */
.chat{display:flex;flex-direction:column;height:100%}
.msgs{flex:1;overflow-y:auto;padding:4px 2px 12px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:86%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.msg.ai{background:var(--card);border:1px solid var(--line);border-bottom-left-radius:5px;align-self:flex-start}
.msg.user{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04130d;border-bottom-right-radius:5px;align-self:flex-end;font-weight:600}
.msg.ai b{color:var(--accent)}
.quick{display:flex;gap:7px;overflow-x:auto;padding:8px 0;-webkit-overflow-scrolling:touch}
.quick::-webkit-scrollbar{display:none}
.quick button{flex-shrink:0;background:var(--card2);border:1px solid var(--line);color:var(--txt);padding:8px 13px;border-radius:18px;font-size:12.5px;font-weight:600;white-space:nowrap}
.chatbar{display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--line)}
.chatbar input{flex:1}
.chatbar button{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#04130d;width:48px;border-radius:12px;font-size:18px;font-weight:700;flex-shrink:0}

/* Shopping & recipes */
.cat-h{font-size:13px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.shop-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:8px}
.shop-item .ck{width:24px;height:24px;border-radius:8px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent}
.shop-item.done .ck{background:var(--accent);border-color:var(--accent);color:#04130d}
.shop-item.done .si-n{text-decoration:line-through;color:var(--muted)}
.shop-item .si-n{flex:1;font-size:14px;font-weight:600}
.shop-item .si-q{font-size:12px;color:var(--muted);font-weight:600}
.recipe{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:12px}
.recipe .rh{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.recipe .rh .rt{font-size:15px;font-weight:700}
.recipe .af{font-size:10px;font-weight:800;padding:3px 8px;border-radius:7px;background:rgba(34,211,238,.14);color:var(--accent2)}
.recipe .ring{font-size:12.5px;color:var(--muted);line-height:1.6}
.recipe .rsteps{font-size:13px;line-height:1.6;margin-top:8px;color:var(--txt)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:50;display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex;animation:fade .2s}
.modal{background:var(--card);border:1px solid var(--line);border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:18px 18px max(18px,env(safe-area-inset-bottom));animation:slideup .28s cubic-bezier(.2,.9,.3,1)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.modal .grab{width:38px;height:4px;border-radius:4px;background:var(--line);margin:0 auto 14px}
.modal h3{font-size:18px;font-weight:800;margin-bottom:4px}
.modal .msub{font-size:13px;color:var(--muted);margin-bottom:16px}
.altlist{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.alt{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--card2);border:1px solid var(--line);border-radius:13px}
.alt .an{font-size:14px;font-weight:600}
.alt .am{font-size:11px;color:var(--muted);margin-top:2px}
.alt button{background:var(--accent);border:none;color:#04130d;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:700;flex-shrink:0;margin-left:8px}
.divlbl{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;display:flex;align-items:center;gap:10px}
.divlbl::before,.divlbl::after{content:'';flex:1;height:1px;background:var(--line)}
.note{font-size:12px;color:var(--muted);line-height:1.5;background:var(--card2);border-radius:10px;padding:10px 12px;margin-top:10px}

.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .ee{font-size:46px;margin-bottom:12px}
.empty h3{font-size:17px;font-weight:700;color:var(--txt);margin-bottom:6px}
.empty p{font-size:13px;line-height:1.5}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#04130d;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:700;z-index:100;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(4,19,13,.3);border-top-color:#04130d;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}

/* Print */
#printArea{display:none}
@media print{
  body *{visibility:hidden}
  #printArea,#printArea *{visibility:visible}
  #printArea{display:block;position:absolute;left:0;top:0;width:100%;padding:24px;background:#fff;color:#000;font-size:12px}
  .app{display:none}
}

let MENU = loadMenu() || null; // menù settimanale generato

function load(){try{return JSON.parse(localStorage.getItem('macroai_profile'))}catch(e){return null}}
function save(){localStorage.setItem('macroai_profile',JSON.stringify(S))}
function loadMenu(){try{return JSON.parse(localStorage.getItem('macroai_menu'))}catch(e){return null}}
function saveMenu(){localStorage.setItem('macroai_menu',JSON.stringify(MENU))}

/* ---------- UTIL ---------- */
const kcalFromMacros=(p,c,f)=>Math.round(p*4+c*4+f*9);
const round5=n=>Math.max(0,Math.round(n/5)*5);
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),1900)}
function go(sc){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('sc-'+sc).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.sc===sc));
  document.getElementById('content')&&document.querySelector('.content').scrollTo(0,0);
  if(sc==='menu')renderMenu();
  if(sc==='shop')renderShop();
  if(sc==='recipes')renderRecipes();
  if(sc==='settings')renderSettings();
}
function openModal(html){document.getElementById('modal').innerHTML='<div class="grab"></div>'+html;document.getElementById('modalBg').classList.add('show')}
function closeModal(){document.getElementById('modalBg').classList.remove('show')}

const OB_TOTAL = 9;

function startOnboarding(existing){
  ob.step=0;
  ob.data = existing ? JSON.parse(JSON.stringify(existing)) : {
    name:'', trainingDays:3, twoMenus:false,
    trainingList:[0,2,4],
    macros:{ train:{p:160,c:220,f:60}, rest:{p:160,c:160,f:60} },
    specialDays:[],
    meals:4, mealNames:[],
    cheat:{enabled:false, day:5, mealIndex:1, desc:'', p:40,c:80,f:30},
    allergies:'', dislikes:''
  };
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('sc-onboarding').classList.add('active');
  document.getElementById('nav').style.display='none';
  document.getElementById('gearBtn').style.display = existing?'flex':'none';
  renderOb();
}

function obProgress(){
  let h='';for(let i=0;i<OB_TOTAL;i++)h+=`<span class="${i<=ob.step?'done':''}"></span>`;

}

    <button class="btn" style="margin-top:14px" onclick="doMacroCalc('${mode}')">Calcola e applica</button>`;

function doMacroCalc(mode){
  const sex=document.getElementById('mc_sex').value;
  const age=+document.getElementById('mc_age').value||30;
  const w=+document.getElementById('mc_w').value||75;
  const ht=+document.getElementById('mc_h').value||175;
  const act=+document.getElementById('mc_act').value;
  const goal=+document.getElementById('mc_goal').value;
  // Mifflin-St Jeor
  let bmr=10*w+6.25*ht-5*age+(sex==='m'?5:-161);
  let kcal=bmr*act*(1+goal);
  // split: proteine 2g/kg, grassi 0.9g/kg, resto carbo
  const p=Math.round(2*w);
  const f=Math.round(0.9*w);
  const c=Math.max(50,Math.round((kcal-(p*4+f*9))/4));
  document.getElementById('mc_out').innerHTML=`Stima: <b>${kcalFromMacros(p,c,f)} kcal</b> · P<b>${p}</b> C<b>${c}</b> G<b>${f}</b> g`;
  // applica
  if(mode==='ob'){
    ob.data.macros.train={p,c,f};
    ob.data.macros.rest={p,c:Math.round(c*0.65),f}; // riposo: meno carbo
    setTimeout(()=>{closeModal();renderOb();toast('Macro calcolati e applicati ✅');},700);
  } else {
    S.macros.train={p,c,f};
    S.macros.rest=S.twoMenus?{p,c:Math.round(c*0.65),f}:{p,c,f};
    setTimeout(()=>{closeModal();renderSettings();toast('Macro calcolati ✅ — premi Salva');},700);
  }
}

function mealNamesFor(n){

    7:['Colazione','Spuntino','Pranzo','Spuntino','Merenda','Cena','Spuntino serale']};
  return map[n]||Array.from({length:n},(_,i)=>'Pasto '+(i+1));
}

/* ============================================================
   GENERATORE MENÙ  (rispetta i macro)
   ============================================================ */
function dayTarget(dayIdx){
  const sp=S.specialDays.find(s=>s.day===dayIdx);
  if(sp)return {p:sp.p,c:sp.c,f:sp.f,type:'special',label:sp.name};
  const isTrain = S.twoMenus ? S.trainingList.includes(dayIdx) : true;
  const m=isTrain?S.macros.train:S.macros.rest;
  return {p:m.p,c:m.c,f:m.f,type:isTrain?'train':'rest',label:isTrain?'Allenamento':'Riposo'};
}

// alimenti consentiti (no allergeni, no sgraditi)
function allowed(cat,dayIdx,seed){
  const algText=(S.allergies||'').toLowerCase();
  const disText=(S.dislikes||'').toLowerCase();
  return DB.filter(f=>f.cat===cat).filter(f=>{
    // allergeni
    for(const a of f.alg){ if(algText.includes(a.toLowerCase().split(' ')[0]))return false; }
    if(algText.includes('lattosio')&&f.cat==='dairy')return false;
    if(algText.includes('glutine')&&f.alg.includes('glutine'))return false;
    // sgraditi: match parola del nome
    const words=f.n.toLowerCase().split(/[ ’']/);
    for(const w of words){ if(w.length>3 && disText.includes(w))return false; }
    if(disText.includes(f.n.toLowerCase()))return false;
    return true;
  });
}
function pick(arr,seed){ return arr.length?arr[seed%arr.length]:null; }

// distribuisci macro del giorno tra i pasti
function mealSplit(meals,cheatIdx){
  // pesi tipici per ruolo
  const base={2:[.45,.55],3:[.3,.4,.3],4:[.25,.35,.12,.28],5:[.22,.1,.32,.1,.26],6:[.2,.1,.28,.1,.22,.1],7:[.18,.08,.26,.1,.1,.2,.08]};
  let w=base[meals]||Array.from({length:meals},()=>1/meals);
  return w;
}

const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

function buildMeal(target,dayIdx,mealIdx,role){
  // target {p,c,f}; costruisce alimenti e quantità per avvicinarsi
  const seed=dayIdx*7+mealIdx;
  const isBk = role==='Colazione';
  let fixed=[];
  // VERDURA fissa (no colazione) / FRUTTA a colazione
  if(!isBk){
    const veg=pick(allowed('veg'),seed+dayIdx);
    if(veg)fixed.push({food:veg.n,g:150});
  } else {
    const fruit=pick(allowed('fruit'),seed);
    if(fruit)fixed.push({food:fruit.n,g:120});
  }
  // contributo macro degli alimenti fissi
  const fixedMac=()=>{let b={p:0,c:0,f:0};fixed.forEach(x=>{const ff=findFood(x.food);b.p+=ff.p*x.g/100;b.c+=ff.c*x.g/100;b.f+=ff.f*x.g/100;});return b;};

  // PROTEINA: scelgo varietà ma evito proteine troppo grasse se il budget di grassi è basso
  let pros=allowed('pro').concat(allowed('dairy'));
  if(isBk){const bp=pros.filter(f=>f.tags&&f.tags.includes('bk'));if(bp.length)pros=bp;}
  let pro=pickLeanProtein(pros,target,fixedMac(),seed+1);
  // CARBO
  let carbs=allowed('carb');
  if(isBk){const bc=carbs.filter(f=>f.tags&&f.tags.includes('bk'));if(bc.length)carbs=bc;}
  const carb=pick(carbs,seed+3);
  // GRASSO
  let fats=allowed('fat');
  if(isBk){const bf=fats.filter(f=>f.tags&&f.tags.includes('bk'));if(bf.length)fats=bf;}
  const fat=pick(fats,seed+2);

  // risoluzione iterativa: ogni macro è dominato da una fonte, in poche iterazioni converge
  let gP=120,gC=120,gF=8;
  for(let it=0;it<6;it++){
    const b=fixedMac();
    if(pro){const cP=carb?carb.p*gC/100:0,fP=fat?fat.p*gF/100:0;gP=clamp(round5((target.p-b.p-cP-fP)/(pro.p/100||1)),20,400);}
    if(carb){const pC=pro?pro.c*gP/100:0,fC=fat?fat.c*gF/100:0;gC=clamp(round5((target.c-b.c-pC-fC)/(carb.c/100||1)),10,400);}
    if(fat){const pF=pro?pro.f*gP/100:0,cF=carb?carb.f*gC/100:0;const need=target.f-b.f-pF-cF;gF=clamp(round5(need/(fat.f/100||1)),need>3?5:0,fat.f>=90?25:90);}
  }
  let foods=fixed.map(x=>({food:x.food,g:x.g,locked:false}));
  if(pro)foods.push({food:pro.n,g:gP,locked:false});
  if(carb)foods.push({food:carb.n,g:gC,locked:false});
  if(fat&&gF>0)foods.push({food:fat.n,g:gF,locked:false});
  return {name:role,foods,cheat:false};
}

// sceglie una proteina variata ma compatibile col budget di grassi del pasto
function pickLeanProtein(list,target,base,seed){
  if(!list.length)return null;
  const budget=Math.max(6,(target.f-base.f)*0.7); // grasso che la proteina può "spendere"
  const n=list.length;
  for(let k=0;k<n;k++){
    const cand=list[(seed+k)%n];
    const g=cand.p>0?(target.p-base.p)/(cand.p/100):0;
    if((cand.f*g/100)<=budget)return cand; // prima candidata abbastanza magra
  }
  // nessuna rientra: prendo la più magra in assoluto
  return list.slice().sort((a,b)=>a.f-b.f)[0];
}

function generateWeek(){
  MENU={days:[]};
  const mealW=mealSplit(S.meals);
  const names=S.mealNames&&S.mealNames.length?S.mealNames:mealNamesFor(S.meals);
  for(let d=0;d<7;d++){
    const tgt=dayTarget(d);
    let dayMeals=[];
    // togli macro sgarro dal target se è in questo giorno
    let eff={p:tgt.p,c:tgt.c,f:tgt.f};
    const hasCheat = S.cheat.enabled && S.cheat.day===d;
    if(hasCheat){ eff={p:Math.max(0,tgt.p-S.cheat.p),c:Math.max(0,tgt.c-S.cheat.c),f:Math.max(0,tgt.f-S.cheat.f)}; }
    const otherMeals = hasCheat? S.meals-1 : S.meals;
    // ridistribuisci pesi sui pasti non-sgarro
    let wsum=0; mealW.forEach((w,i)=>{ if(!(hasCheat&&i===S.cheat.mealIndex))wsum+=w; });
    for(let m=0;m<S.meals;m++){
      if(hasCheat && m===S.cheat.mealIndex){
        dayMeals.push({name:names[m],cheat:true,desc:S.cheat.desc||'Pasto libero',
          foods:[{food:'__cheat__',label:S.cheat.desc||'Pasto libero (sgarro)',g:null,p:S.cheat.p,c:S.cheat.c,f:S.cheat.f,locked:true}]});
        continue;
      }
      const w=mealW[m]/wsum;
      const mt={p:eff.p*w,c:eff.c*w,f:eff.f*w};
      dayMeals.push(buildMeal(mt,d,m,names[m]));
    }
    MENU.days.push({meals:dayMeals});
  }
  saveMenu();
}

/* calcola macro di un alimento riga */
function foodMacros(item){
  if(item.food==='__cheat__'){return {k:kcalFromMacros(item.p,item.c,item.f),p:item.p,c:item.c,f:item.f};}
  const ff=findFood(item.food);if(!ff)return {k:0,p:0,c:0,f:0};
  const g=item.g||0;
  return {k:Math.round(ff.k*g/100),p:+(ff.p*g/100).toFixed(1),c:+(ff.c*g/100).toFixed(1),f:+(ff.f*g/100).toFixed(1)};
}
function mealMacros(meal){let t={k:0,p:0,c:0,f:0};meal.foods.forEach(it=>{const m=foodMacros(it);t.k+=m.k;t.p+=m.p;t.c+=m.c;t.f+=m.f;});return {k:Math.round(t.k),p:Math.round(t.p),c:Math.round(t.c),f:Math.round(t.f)};}
function dayMacros(dayIdx){let t={k:0,p:0,c:0,f:0};MENU.days[dayIdx].meals.forEach(meal=>{const m=mealMacros(meal);t.k+=m.k;t.p+=m.p;t.c+=m.c;t.f+=m.f;});return t;}

   RENDER MENÙ
   ============================================================ */
function renderMenu(){

  const got=dayMacros(curDay);

  let h=`<div class="daysel">${DAYS.map((dd,i)=>{
      const t=dayTarget(i);const tr=t.type==='train';
      return `<div class="dpill ${i===curDay?'on':''}" onclick="curDay=${i};renderMenu()">${tr?'<span class="tdot"></span>':''}<span class="dd">${DSHORT[i]}</span></div>`;
    }).join('')}</div>`;

  h+=`<div class="daytitle"><h2>${DAYS[curDay]}</h2><span class="daytag ${tagClass}">${tgt.label}</span></div>`;

  // target progress
  h+=`<div class="tgt">
    <div class="tgt-h"><span class="tt">Obiettivo giornaliero</span><span class="tt" style="color:var(--cal);font-weight:700">${got.k} / ${kcalFromMacros(tgt.p,tgt.c,tgt.f)} kcal</span></div>
    ${macroBar('Proteine',got.p,tgt.p,'var(--pro)')}
    ${macroBar('Carboidrati',got.c,tgt.c,'var(--car)')}
    ${macroBar('Grassi',got.f,tgt.f,'var(--fat)')}
  </div>`;

  // tracker acqua (solo per il giorno di oggi)
  if(curDay===((new Date().getDay()+6)%7)){
    const w=waterGet();
    h+=`<div class="tgt" style="display:flex;align-items:center;justify-content:space-between;gap:12px">
      <div><div style="font-size:13px;font-weight:700">💧 Acqua di oggi</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px">${(w*0.25).toFixed(2)} L · obiettivo 2 L</div>
        <div style="font-size:16px;margin-top:6px;letter-spacing:1px">${'🥛'.repeat(Math.min(w,8))}${'·'.repeat(Math.max(0,8-w))}</div></div>
      <div class="stepper" style="gap:8px"><button onclick="waterAdd(-1)">−</button><div class="val" style="font-size:20px;min-width:34px">${w}</div><button onclick="waterAdd(1)">+</button></div>

/* riadatta gli alimenti NON bloccati del pasto per centrare il target */
function rebalanceMeal(d,mi,changedFi){
  const meal=MENU.days[d].meals[mi];if(meal.cheat)return;
  // target del pasto = quota del giorno
  const tgt=dayTarget(d);
  const hasCheat=S.cheat.enabled&&S.cheat.day===d;
  let eff={p:tgt.p,c:tgt.c,f:tgt.f};
  if(hasCheat){eff={p:tgt.p-S.cheat.p,c:tgt.c-S.cheat.c,f:tgt.f-S.cheat.f};}
  const mealW=mealSplit(S.meals);
  let wsum=0;mealW.forEach((w,i)=>{if(!(hasCheat&&i===S.cheat.mealIndex))wsum+=w;});
  const w=(mealW[mi]||1/S.meals)/wsum;
  let need={p:eff.p*w,c:eff.c*w,f:eff.f*w};
  // sottrai contributi bloccati
  meal.foods.forEach((it,i)=>{if(it.locked||i===changedFi){const m=foodMacros(it);need.p-=m.p;need.c-=m.c;need.f-=m.f;}});
  // distribuisci sul resto per categoria
  meal.foods.forEach((it,i)=>{
    if(it.locked||i===changedFi)return;
    const ff=findFood(it.food);if(!ff)return;
    let g=it.g;
    if(ff.cat==='carb'&&ff.c>0)g=round5(Math.max(10,need.c/(ff.c/100)));
    else if(ff.cat==='pro'&&ff.p>0)g=round5(Math.max(20,need.p/(ff.p/100)));
    else if(ff.cat==='fat'&&ff.f>0)g=round5(Math.max(5,Math.min(25,need.f/(ff.f/100))));
    it.g=Math.min(g,450);
  });
}

function regenMeal(d,mi){
  const meal=MENU.days[d].meals[mi];if(meal.cheat)return;
  const tgt=dayTarget(d);const mealW=mealSplit(S.meals);
  const hasCheat=S.cheat.enabled&&S.cheat.day===d;
  let eff={p:tgt.p,c:tgt.c,f:tgt.f};if(hasCheat)eff={p:tgt.p-S.cheat.p,c:tgt.c-S.cheat.c,f:tgt.f-S.cheat.f};
  let wsum=0;mealW.forEach((w,i)=>{if(!(hasCheat&&i===S.cheat.mealIndex))wsum+=w;});
  const w=(mealW[mi]||1/S.meals)/wsum;
  const nm=buildMeal({p:eff.p*w,c:eff.c*w,f:eff.f*w},d,mi+Math.floor(Math.random()*50),meal.name);
  nm.name=meal.name;MENU.days[d].meals[mi]=nm;
  saveMenu();renderMenu();toast('Pasto rigenerato 🔄');
}
function regenDay(d){
  const tgt=dayTarget(d);const mealW=mealSplit(S.meals);const names=S.mealNames;
  const hasCheat=S.cheat.enabled&&S.cheat.day===d;
  let eff={p:tgt.p,c:tgt.c,f:tgt.f};if(hasCheat)eff={p:tgt.p-S.cheat.p,c:tgt.c-S.cheat.c,f:tgt.f-S.cheat.f};
  let wsum=0;mealW.forEach((w,i)=>{if(!(hasCheat&&i===S.cheat.mealIndex))wsum+=w;});
  let meals=[];
  for(let m=0;m<S.meals;m++){
    if(hasCheat&&m===S.cheat.mealIndex){meals.push({name:names[m],cheat:true,desc:S.cheat.desc,foods:[{food:'__cheat__',label:S.cheat.desc||'Pasto libero',g:null,p:S.cheat.p,c:S.cheat.c,f:S.cheat.f,locked:true}]});continue;}
    const w=mealW[m]/wsum;
    meals.push(buildMeal({p:eff.p*w,c:eff.c*w,f:eff.f*w},d+Math.floor(Math.random()*99),m,names[m]));
  }
  MENU.days[d].meals=meals;saveMenu();renderMenu();toast(DAYS[d]+' rigenerato');
}

function toggleShop(n){shopDone[n]=!shopDone[n];localStorage.setItem('macroai_shop',JSON.stringify(shopDone));renderShop();}
function shopText(){
  const agg=buildShop();let t=`LISTA DELLA SPESA — ${S.name}\n${'='.repeat(30)}\n\n`;
  const byCat={};Object.entries(agg).forEach(([n,o])=>{(byCat[o.cat]=byCat[o.cat]||[]).push([n,o.g]);});
  ['pro','carb','dairy','fat','veg','fruit'].forEach(cat=>{if(!byCat[cat])return;t+=CATLBL[cat].replace(/[^\wàèéìòù &]/gi,'').trim()+'\n';byCat[cat].forEach(([n,g])=>{t+=`  [ ] ${n} — ${g>=1000?(g/1000).toFixed(1)+'kg':Math.round(g)+'g'}\n`;});t+='\n';});
  return t;
}
function printShop(){document.getElementById('printArea').innerHTML='<h1>Lista della spesa — '+S.name+'</h1><pre style="font-family:inherit;white-space:pre-wrap;font-size:13px">'+shopText().split('\n').slice(2).join('\n')+'</pre>';setTimeout(()=>window.print(),120);}
function downloadShop(){try{const b=new Blob([shopText()],{type:'text/plain;charset=utf-8'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='lista-spesa.txt';document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(u);},500);toast('Lista scaricata ⬇️');}catch(e){toast('Errore download');}}

let recipeFilter='all';
function renderRecipes(){
  // ricette pertinenti agli alimenti presenti nel menù
  let present=new Set();
  if(MENU)MENU.days.forEach(d=>d.meals.forEach(m=>m.foods.forEach(it=>{if(it.food!=='__cheat__')present.add(it.food);})));
  let list=RECIPES.filter(r=>{
    if(recipeFilter==='af'&&!r.af)return false;
    // escludi se ingrediente base è tra allergeni/sgraditi
    const dis=(S.dislikes||'').toLowerCase(),alg=(S.allergies||'').toLowerCase();
    if(dis.includes(r.base.toLowerCase()))return false;
    return true;
  });
  // ordina: prima quelle con ingrediente nel menù
  list.sort((a,b)=>(present.has(b.base)?1:0)-(present.has(a.base)?1:0));
  let h=`<div class="daytitle"><h2>Ricette</h2></div>
    <div class="chips" style="margin-bottom:14px">
      <div class="chip ${recipeFilter==='all'?'on':''}" onclick="recipeFilter='all';renderRecipes()">Tutte</div>
      <div class="chip ${recipeFilter==='af'?'on':''}" onclick="recipeFilter='af';renderRecipes()">🌀 Friggitrice ad aria</div>
    </div>`;
  list.forEach(r=>{
    const inMenu=present.has(r.base);
    h+=`<div class="recipe"><div class="rh"><span class="rt">${r.t}</span>${r.af?'<span class="af">AIR FRYER</span>':''}${inMenu?'<span class="af" style="background:rgba(52,211,153,.14);color:var(--accent)">nel menù</span>':''}</div>
      <div class="ring"><b>Ingredienti:</b> ${r.ing}</div>
      <div class="rsteps">${r.steps}</div></div>`;
  });
  document.getElementById('sc-recipes').innerHTML=h;
}
function emptyState(e,t,p){return `<div class="empty"><div class="ee">${e}</div><h3>${t}</h3><p>${p}</p></div>`;}

let chatHist=[];
function initCoach(first){
  if(first){
    chatHist=[];
    pushMsg('ai',`Ciao ${S.name}! 🤖 Sono il tuo AI coach. Ho già preparato il tuo menù settimanale rispettando i tuoi macro.\n\nPuoi chiedermi di:\n• <b>rigenerare</b> un pasto, un giorno o tutta la settimana\n• <b>cambiare un alimento</b> (“cambia il pollo di lunedì”)\n• dirmi <b>“non mi piace X”</b> e lo tolgo da tutto\n• la <b>lista della spesa</b> o delle <b>ricette</b> (anche friggitrice ad aria)\n• <b>scaricare/stampare</b> il menù\n\nDimmi pure! 💪`);
  }

}
function renderQuick(){

  document.getElementById('quick').innerHTML=qs.map(q=>`<button onclick="coachQuick('${q.replace(/'/g,"\\'")}')">${q}</button>`).join('');

function pushMsg(role,txt){chatHist.push({role,txt});const m=document.getElementById('msgs');const d=document.createElement('div');d.className='msg '+role;d.innerHTML=txt;m.appendChild(d);m.scrollTop=m.scrollHeight;}
function coachQuick(q){document.getElementById('chatIn').value=q;coachSend();}
function coachSend(){
  const inp=document.getElementById('chatIn');const t=inp.value.trim();if(!t)return;
  pushMsg('user',t);inp.value='';
  setTimeout(()=>{const r=coachReply(t);pushMsg('ai',r);},350);
}

// parser: trova giorno e pasto citati
function parseDay(t){for(let i=0;i<7;i++){if(t.includes(DAYS[i].toLowerCase())||t.includes(DSHORT[i].toLowerCase()))return i;}if(t.includes('oggi'))return curDay;if(t.includes('domani'))return (curDay+1)%7;return -1;}
function parseMeal(t){const names=S.mealNames.map(n=>n.toLowerCase());for(let i=0;i<names.length;i++){if(t.includes(names[i]))return i;}if(t.includes('colaz'))return names.findIndex(n=>n.includes('colaz'));if(t.includes('pranzo'))return names.findIndex(n=>n.includes('pranzo'));if(t.includes('cena'))return names.findIndex(n=>n.includes('cena'));return -1;}

function coachReply(raw){
  const t=raw.toLowerCase();
  // SALUTI
  if(/^(ciao|ehi|hey|buongiorno|buonasera|salve)\b/.test(t))return `Ciao ${S.name}! 👋 Come posso aiutarti col tuo menù? Posso rigenerare pasti, cambiare alimenti, fare la lista della spesa o suggerirti ricette.`;
  if(/grazie|perfetto|ottimo|bene/.test(t)&&t.length<25)return 'Di niente! 💪 Sono qui se ti serve altro.';

  // STAMPA / DOWNLOAD
  if(/(scarica|download|esporta|salva)/.test(t)&&/menu|menù/.test(t)||/(scarica|download|esporta)/.test(t)&&!/spesa/.test(t)){downloadMenu();return '⬇️ Sto scaricando il tuo menù settimanale in formato testo. Lo trovi nei download!';}
  if(/stampa/.test(t)){if(/spesa/.test(t)){go('shop');setTimeout(printShop,300);return '🖨️ Apro la stampa della lista della spesa.';}printMenu();return '🖨️ Apro l’anteprima di stampa del menù. Da lì puoi anche salvarlo come PDF!';}

  // LISTA SPESA
  if(/spesa|comprare|comprato|acquist|supermercat/.test(t)){go('shop');return '🛒 Ecco la <b>lista della spesa</b> con tutto quello che serve per il menù della settimana, diviso per reparto. La trovi nella scheda Spesa!';}

  // RICETTE
  if(/ricett|cucinar|friggitrice|air ?fryer|forno/.test(t)){if(/friggitrice|air ?fryer/.test(t)){recipeFilter='af';}go('recipes');renderRecipes();return /friggitrice|air ?fryer/.test(t)?'🌀 Ecco le ricette per la <b>friggitrice ad aria</b> con i tuoi alimenti! Le trovi nella scheda Ricette.':'📖 Ti ho aperto le <b>ricette</b> consigliate con gli alimenti del tuo menù — incluse quelle per friggitrice ad aria!';}

  // NON MI PIACE X
  let mdis=t.match(/non mi piac\w*\s+(?:il |la |lo |i |le |gli |l')?([a-zàèéìòù ]+)/);
  if(mdis||/togli|elimina|rimuovi|odio|detesto/.test(t)){
    let term=mdis?mdis[1].trim():(t.match(/(?:togli|elimina|rimuovi|odio|detesto)\s+(?:il |la |lo |l')?([a-zàèéìòù ]+)/)||[])[1];
    if(term){term=term.trim();
      S.dislikes=(S.dislikes?S.dislikes+', ':'')+term;save();
      generateWeek();renderMenu();
      return `Capito 👍 Ho aggiunto <b>${term}</b> agli alimenti da evitare e ho rigenerato tutto il menù senza usarlo, mantenendo i tuoi macro. Lo vedi nella scheda Menù!`;
    }
  }
  // ALLERGIA
  let malg=t.match(/(?:sono allergic\w*|allergia|intoller\w*)\s*(?:a|al|alla|ai|alle|agli)?\s*([a-zàèéìòù ]+)/);
  if(malg&&malg[1]){const term=malg[1].trim();S.allergies=(S.allergies?S.allergies+', ':'')+term;save();generateWeek();renderMenu();return `Registrato ⚠️ Ho segnato l’allergia a <b>${term}</b> e rigenerato il menù escludendo questi alimenti. Stai tranquillo!`;}

  // PIÙ / MENO MACRO
  if(/più protein|piu protein|aumenta.*protein|alza.*protein/.test(t)){S.macros.train.p+=15;S.macros.rest.p+=15;save();generateWeek();renderMenu();return '💪 Ho aumentato le proteine di 15g al giorno e riadattato tutto il menù. Le kcal si aggiornano in automatico!';}
  if(/meno carb|riduci.*carb|abbassa.*carb/.test(t)){S.macros.train.c=Math.max(50,S.macros.train.c-30);S.macros.rest.c=Math.max(50,S.macros.rest.c-30);save();generateWeek();renderMenu();return '📉 Ho ridotto i carboidrati di 30g al giorno e rigenerato il menù mantenendo l’equilibrio.';}
  if(/più carb|piu carb|aumenta.*carb/.test(t)){S.macros.train.c+=30;S.macros.rest.c+=30;save();generateWeek();renderMenu();return '🍚 Carboidrati aumentati di 30g/giorno. Menù aggiornato!';}

  // RIGENERA
  const day=parseDay(t),meal=parseMeal(t);
  if(/rigener|cambia|nuovo|diverso|varia|altro menu|altro menù/.test(t)){
    if(/settiman|tutto|intero menu|intero menù/.test(t)){regenAll();go('menu');return '🔁 Fatto! Ho rigenerato <b>tutta la settimana</b> con un menù vario che rispetta i tuoi macro.';}
    if(day>=0&&meal>=0){regenMeal(day,meal);curDay=day;go('menu');return `🔄 Ho rigenerato <b>${S.mealNames[meal]} di ${DAYS[day]}</b> mantenendo i macro del pasto.`;}
    if(meal>=0){regenMeal(curDay,meal);go('menu');return `🔄 Ho rigenerato <b>${S.mealNames[meal]}</b> di ${DAYS[curDay]}.`;}
    if(day>=0){regenDay(day);curDay=day;go('menu');return `🔄 Ho rigenerato tutto il <b>${DAYS[day]}</b> con pasti nuovi e vari.`;}
    if(/oggi/.test(t)){regenDay(curDay);go('menu');return '🔄 Giorno rigenerato!';}
    regenAll();go('menu');return '🔁 Ho rigenerato il menù settimanale rispettando i tuoi macro!';
  }
  // CAMBIA SINGOLO ALIMENTO citato
  for(const f of DB){if(t.includes(f.n.toLowerCase())){
    // trova dove sta nel menù e suggerisci alternative
    const alts=allowed(f.cat).filter(a=>a.n!==f.n).slice(0,3).map(a=>a.n);
    return `Vuoi cambiare <b>${f.n}</b>? 👀 Apri la scheda Menù e tocca ✏️ accanto all’alimento: ti propongo alternative come <b>${alts.join(', ')}</b> e, se non ti vanno, puoi cercare un prodotto e riadatto in automatico gli altri alimenti per centrare i macro.`;
  }}

  // MACRO / INFO
  if(/macro|calorie|kcal|quanto|obiettiv/.test(t)){const tg=dayTarget(curDay);const g=dayMacros(curDay);return `📊 Oggi (${DAYS[curDay]} — ${tg.label}):\n<b>Obiettivo:</b> ${kcalFromMacros(tg.p,tg.c,tg.f)}kcal · P${tg.p} C${tg.c} G${tg.f}\n<b>Nel menù:</b> ${g.k}kcal · P${g.p} C${g.c} G${g.f}\n\nLe calorie le calcolo sempre in automatico dai macro!`;}
  if(/sgarro|cheat|pasto liber/.test(t)){if(S.cheat.enabled)return `🍕 Il tuo pasto sgarro è <b>${DAYS[S.cheat.day]}</b> (${S.mealNames[S.cheat.mealIndex]}): ${S.cheat.desc||'pasto libero'}. È solo quel pasto e conto comunque i macro (P${S.cheat.p} C${S.cheat.c} G${S.cheat.f}). Puoi modificarlo dalla scheda Menù o dalle Impostazioni.`;return 'Al momento non hai un pasto sgarro impostato. Puoi attivarlo dalle Impostazioni ⚙️ e scegliere giorno, pasto e di cosa è fatto!';}
  if(/calcola.*macro|non so.*macro|quanti.*dovrei|stima.*macro|aiuto.*macro/.test(t)){openMacroCalc('settings');return '🧮 Apro il calcolatore: con pochi dati (peso, altezza, età, attività, obiettivo) stimo i tuoi macro. Poi premi Salva!';}
  if(/acqua|bere|idrataz/.test(t)){go('menu');return '💧 Trovi il tracker dell’acqua in alto nella scheda Menù (giorno di oggi): tocca + ogni bicchiere da 250 ml. Obiettivo 2 L!';}
  if(/impostazion|settings|profilo|modifica.*macro|cambia.*macro/.test(t)){openSettings();return '⚙️ Ti ho aperto le Impostazioni: qui puoi cambiare macro, pasti, sgarro, allergie e cibi che non ti piacciono. Tutto ciò che hai impostato all’inizio!';}
  if(/aiuto|help|cosa puoi|come funzion/.test(t))return 'Ecco cosa posso fare per te 🤖:\n• <b>“rigenera lunedì / la cena / la settimana”</b>\n• <b>“non mi piace il tofu”</b> → lo tolgo da tutto\n• <b>“sono allergico al lattosio”</b>\n• <b>“più proteine” / “meno carboidrati”</b>\n• <b>“lista della spesa”</b>\n• <b>“ricette friggitrice ad aria”</b>\n• <b>“scarica/stampa il menù”</b>\nProva pure!';

  // fallback
  return `Non sono sicuro di aver capito 🤔. Posso: rigenerare pasti/giorni/settimana, cambiare alimenti, gestire allergie e cibi non graditi, fare la lista della spesa, suggerire ricette (anche friggitrice ad aria) e far scaricare/stampare il menù.\nProva ad esempio: <b>“rigenera la cena di oggi”</b> o <b>“lista della spesa”</b>.`;
}

    <p class="sub" style="color:var(--muted);font-size:13px;margin-bottom:14px">Modifica quello che vuoi: rigenero il menù di conseguenza. Le calorie restano sempre calcolate in automatico dai macro.</p>`;

  h+=`<div class="card"><h2>👤 Profilo</h2><div class="sub">Nome e allenamenti</div>
    <label class="fld"><span class="lab">Nome</span><input type="text" id="st_name" value="${d.name}"></label>
    <label class="fld"><span class="lab">Allenamenti / settimana</span><input type="number" id="st_td" value="${d.trainingDays}"></label>

      <label class="fld" style="flex:1"><span class="lab" style="color:var(--car)">Carbo</span><input type="number" id="st_tc" value="${d.macros.train.c}" oninput="stKcal('t')"></label>
      <label class="fld" style="flex:1"><span class="lab" style="color:var(--fat)">Grassi</span><input type="number" id="st_tf" value="${d.macros.train.f}" oninput="stKcal('t')"></label></div>
    <button class="btn ghost sm" style="width:100%;margin-top:4px" onclick="openMacroCalc('settings')">🧮 Calcola i miei macro</button></div>`;

  h+=`<div class="card"><h2>🛌 Macro — Riposo</h2><div class="sub">kcal: <b id="st_rk">${kcalFromMacros(d.macros.rest.p,d.macros.rest.c,d.macros.rest.f)}</b> (auto)</div>
    <div class="row" style="gap:8px"><label class="fld" style="flex:1"><span class="lab" style="color:var(--pro)">Pro</span><input type="number" id="st_rp" value="${d.macros.rest.p}" oninput="stKcal('r')"></label>
      <label class="fld" style="flex:1"><span class="lab" style="color:var(--car)">Carbo</span><input type="number" id="st_rc" value="${d.macros.rest.c}" oninput="stKcal('r')"></label>

  h+=`<div class="card"><h2>🍽️ Pasti al giorno</h2>

function stKcal(p){const pp=+document.getElementById('st_'+p+'p').value||0,cc=+document.getElementById('st_'+p+'c').value||0,ff=+document.getElementById('st_'+p+'f').value||0;document.getElementById('st_'+p+'k').textContent=kcalFromMacros(pp,cc,ff);}
function saveSettings(){
  S.name=document.getElementById('st_name').value.trim()||S.name;
  S.trainingDays=+document.getElementById('st_td').value||S.trainingDays;
  S.twoMenus=document.getElementById('st_two').classList.contains('on');
  S.macros.train={p:+document.getElementById('st_tp').value||0,c:+document.getElementById('st_tc').value||0,f:+document.getElementById('st_tf').value||0};
  S.macros.rest={p:+document.getElementById('st_rp').value||0,c:+document.getElementById('st_rc').value||0,f:+document.getElementById('st_rf').value||0};
  if(!S.twoMenus)S.macros.rest={...S.macros.train};
  const nm=+document.getElementById('st_meals').value||S.meals;
  if(nm!==S.meals){S.meals=Math.max(2,Math.min(7,nm));S.mealNames=mealNamesFor(S.meals);}
  S.cheat.enabled=document.getElementById('st_cheat').classList.contains('on');
  S.cheat.day=+document.getElementById('st_chday').value;
  S.cheat.mealIndex=Math.min(+document.getElementById('st_chmeal').value,S.meals-1);
  S.cheat.desc=document.getElementById('st_chdesc').value.trim();
  S.cheat.p=+document.getElementById('st_chp').value||0;
  S.cheat.c=+document.getElementById('st_chc').value||0;
  S.cheat.f=+document.getElementById('st_chf').value||0;
  S.allergies=document.getElementById('st_alg').value.trim();
  S.dislikes=document.getElementById('st_dis').value.trim();
  save();generateWeek();go('menu');toast('Impostazioni salvate · menù rigenerato ✅');
}
function resetAll(){if(confirm('Vuoi rifare il questionario iniziale? Le impostazioni attuali verranno usate come base.')){startOnboarding(S);}}

/* ============================================================
   BOOT
   ============================================================ */
function boot(){
  if(S && S.macros){
    document.getElementById('nav').style.display='flex';
    document.getElementById('gearBtn').style.display='flex';
    if(!MENU)generateWeek();
    go('menu');
    initCoach(true);
  } else {
    startOnboarding(null);
  }
}
document.getElementById('chatIn').addEventListener('keypress',e=>{if(e.key==='Enter')coachSend();});

/* Service worker: abilita installazione e uso offline sull'iPhone */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{});});
}
boot();
</script>
</body>
</html>
