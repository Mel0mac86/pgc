  let h=`<div class="daytitle"><h2>Impostazioni</h2></div>
    <p class="sub" style="color:var(--muted);font-size:13px;margin-bottom:14px">Modifica quello che vuoi: rigenero il menù di conseguenza. Le calorie restano sempre calcolate in automatico dai macro.</p>`;

  h+=`<div class="card"><h2>👤 Profilo</h2><div class="sub">Nome e allenamenti</div>
    <label class="fld"><span class="lab">Nome</span><input type="text" id="st_name" value="${d.name}"></label>
    <label class="fld"><span class="lab">Allenamenti / settimana</span><input type="number" id="st_td" value="${d.trainingDays}"></label>
    <div class="toggle"><span class="tlab">Due menù (allenamento / riposo)</span><div class="sw ${d.twoMenus?'on':''}" id="st_two" onclick="this.classList.toggle('on')"></div></div>
    </div>`;

  h+=`<div class="card"><h2>💪 Macro — Allenamento</h2><div class="sub">kcal: <b id="st_tk">${kcalFromMacros(d.macros.train.p,d.macros.train.c,d.macros.train.f)}</b> (auto)</div>
    <div class="row" style="gap:8px"><label class="fld" style="flex:1"><span class="lab" style="color:var(--pro)">Pro</span><input type="number" id="st_tp" value="${d.macros.train.p}" oninput="stKcal('t')"></label>
      <label class="fld" style="flex:1"><span class="lab" style="color:var(--car)">Carbo</span><input type="number" id="st_tc" value="${d.macros.train.c}" oninput="stKcal('t')"></label>
      <label class="fld" style="flex:1"><span class="lab" style="color:var(--fat)">Grassi</span><input type="number" id="st_tf" value="${d.macros.train.f}" oninput="stKcal('t')"></label></div>
    <button class="btn ghost sm" style="width:100%;margin-top:4px" onclick="openMacroCalc('settings')">🧮 Calcola i miei macro</button></div>`;

  h+=`<div class="card"><h2>🛌 Macro — Riposo</h2><div class="sub">kcal: <b id="st_rk">${kcalFromMacros(d.macros.rest.p,d.macros.rest.c,d.macros.rest.f)}</b> (auto)</div>
    <div class="row" style="gap:8px"><label class="fld" style="flex:1"><span class="lab" style="color:var(--pro)">Pro</span><input type="number" id="st_rp" value="${d.macros.rest.p}" oninput="stKcal('r')"></label>
      <label class="fld" style="flex:1"><span class="lab" style="color:var(--car)">Carbo</span><input type="number" id="st_rc" value="${d.macros.rest.c}" oninput="stKcal('r')"></label>
      <label class="fld" style="flex:1"><span class="lab" style="color:var(--fat)">Grassi</span><input type="number" id="st_rf" value="${d.macros.rest.f}" oninput="stKcal('r')"></label></div></div>`;

  h+=`<div class="card"><h2>🍽️ Pasti al giorno</h2>
    <label class="fld" style="margin:0"><input type="number" id="st_meals" value="${d.meals}" min="2" max="7"></label></div>`;

  h+=`<div class="card"><h2>🍕 Pasto sgarro</h2>
    <div class="toggle"><span class="tlab">Attivo</span><div class="sw ${d.cheat.enabled?'on':''}" id="st_cheat" onclick="this.classList.toggle('on')"></div></div>
    <label class="fld"><span class="lab">Giorno</span><select id="st_chday">${DAYS.map((dd,i)=>`<option value="${i}" ${d.cheat.day===i?'selected':''}>${dd}</option>`).join('')}</select></label>
    <label class="fld"><span class="lab">Pasto</span><select id="st_chmeal">${mealNamesFor(d.meals).map((n,i)=>`<option value="${i}" ${d.cheat.mealIndex===i?'selected':''}>${n}</option>`).join('')}</select></label>
    <label class="fld"><span class="lab">In cosa consiste</span><input type="text" id="st_chdesc" value="${d.cheat.desc||''}"></label>
    <div class="row" style="gap:8px"><label class="fld" style="flex:1"><span class="lab" style="color:var(--pro)">Pro</span><input type="number" id="st_chp" value="${d.cheat.p}"></label>
      <label class="fld" style="flex:1"><span class="lab" style="color:var(--car)">Carbo</span><input type="number" id="st_chc" value="${d.cheat.c}"></label>
      <label class="fld" style="flex:1"><span class="lab" style="color:var(--fat)">Grassi</span><input type="number" id="st_chf" value="${d.cheat.f}"></label></div></div>`;

  h+=`<div class="card"><h2>⚠️ Allergie</h2><label class="fld" style="margin:0"><textarea id="st_alg" placeholder="Scrivi liberamente">${d.allergies||''}</textarea></label></div>`;
  h+=`<div class="card"><h2>🙅 Cibi che non mi piacciono</h2><label class="fld" style="margin:0"><textarea id="st_dis" placeholder="Scrivi liberamente">${d.dislikes||''}</textarea></label></div>`;

  h+=`<div class="card"><h2>🍎 I miei alimenti</h2>
    <div class="sub">Crea nuovi alimenti o modifica quelli esistenti (proteine, carboidrati, grassi, kcal). Restano salvati e li ritrovi sempre nella ricerca — non devi riscriverli ogni volta.</div>
    <button class="btn sec" style="width:100%" onclick="openFoodManager()">Gestisci alimenti${CUSTOM.length?' ('+CUSTOM.length+' tuoi)':''}</button></div>`;

  // AI avanzata (opzionale) — Groq
  const hasKey=!!localStorage.getItem('macroai_key');
  const curModel=localStorage.getItem('macroai_model')||'', curVModel=localStorage.getItem('macroai_vmodel')||'';
  h+=`<div class="card"><h2>🤖 AI avanzata — Groq (opzionale)</h2>
    <div class="sub">Fa rispondere il Coach a <b>qualsiasi</b> domanda e abilita la <b>Foto al piatto</b>, usando <b>Groq</b> (ha un piano gratuito). Richiede internet e una tua chiave Groq. Il coach base (menù, spesa, ricette, diario, peso, domande di nutrizione) funziona sempre, anche offline e senza chiave.</div>
    <div class="toggle"><span class="tlab">Attiva AI avanzata</span><div class="sw ${d.aiEnabled?'on':''}" id="st_ai" onclick="this.classList.toggle('on')"></div></div>
    <label class="fld"><span class="lab">Chiave API Groq <span class="hint">(salvata solo sul tuo telefono)</span></span>
      <input type="password" id="st_key" placeholder="${hasKey?'•••••••• (già salvata)':'gsk_...'}" autocomplete="off"></label>
    <div class="note">🔑 Crea la chiave gratis su <b>console.groq.com/keys</b>. Resta in locale e serve solo per l’AI del coach e la foto al piatto.</div>
    <label class="fld" style="margin-top:14px"><span class="lab">Modello chat <span class="hint">(avanzato — lascia vuoto per il default)</span></span>
      <input type="text" id="st_model" value="${curModel.replace(/"/g,'&quot;')}" placeholder="${GROQ_MODEL_DEFAULT}" autocomplete="off"></label>
    <label class="fld"><span class="lab">Modello foto/vision <span class="hint">(avanzato)</span></span>
      <input type="text" id="st_vmodel" value="${curVModel.replace(/"/g,'&quot;')}" placeholder="${GROQ_VMODEL_DEFAULT}" autocomplete="off"></label>
    <div class="note">💡 I nomi dei modelli Groq cambiano nel tempo: se l’AI dà errore “modello non disponibile”, aggiorna qui il nome (elenco su <b>console.groq.com/docs/models</b>).</div>
    ${hasKey?`<button class="btn ghost sm" style="width:100%;margin-top:10px" onclick="if(confirm('Rimuovere la chiave Groq salvata?')){localStorage.removeItem('macroai_key');toast('Chiave rimossa');renderSettings();}">🗑️ Rimuovi chiave salvata</button>`:''}
  </div>`;

  h+=`<button class="btn" onclick="saveSettings()">💾 Salva e rigenera menù</button>
    <button class="btn ghost" style="margin-top:10px" onclick="go('menu')">Annulla</button>
    <button class="btn danger" style="margin:18px 0 30px" onclick="resetAll()">↩️ Rifai il questionario iniziale</button>`;

  document.getElementById('sc-settings').innerHTML=h;
}
function stKcal(p){const pp=+document.getElementById('st_'+p+'p').value||0,cc=+document.getElementById('st_'+p+'c').value||0,ff=+document.getElementById('st_'+p+'f').value||0;document.getElementById('st_'+p+'k').textContent=kcalFromMacros(pp,cc,ff);}
function saveSettings(){
  S.name=document.getElementById('st_name').value.trim()||S.name;
  S.trainingDays=+document.getElementById('st_td').value||S.trainingDays;
  S.twoMenus=document.getElementById('st_two').classList.contains('on');
  S.macros.train={p:+document.getElementById('st_tp').value||0,c:+document.getElementById('st_tc').value||0,f:+document.getElementById('st_tf').value||0};
  S.macros.rest={p:+document.getElementById('st_rp').value||0,c:+document.getElementById('st_rc').value||0,f:+document.getElementById('st_rf').value||0};
  if(!S.twoMenus)S.macros.rest={...S.macros.train};
  const nm=+document.getElementById('st_meals').value||S.meals;
  if(nm!==S.meals){S.meals=Math.max(2,Math.min(7,nm));S.mealNames=mealNamesFor(S.meals);}
  S.cheat.enabled=document.getElementById('st_cheat').classList.contains('on');
  S.cheat.day=+document.getElementById('st_chday').value;
  S.cheat.mealIndex=Math.min(+document.getElementById('st_chmeal').value,S.meals-1);
  S.cheat.desc=document.getElementById('st_chdesc').value.trim();
  S.cheat.p=+document.getElementById('st_chp').value||0;
  S.cheat.c=+document.getElementById('st_chc').value||0;
  S.cheat.f=+document.getElementById('st_chf').value||0;
  S.allergies=document.getElementById('st_alg').value.trim();
  S.dislikes=document.getElementById('st_dis').value.trim();
  // AI avanzata (Groq)
  S.aiEnabled=document.getElementById('st_ai').classList.contains('on');
  const keyIn=document.getElementById('st_key').value.trim();
  if(keyIn)localStorage.setItem('macroai_key',keyIn);
  const mdl=document.getElementById('st_model').value.trim();
  const vmdl=document.getElementById('st_vmodel').value.trim();
  if(mdl)localStorage.setItem('macroai_model',mdl); else localStorage.removeItem('macroai_model');
  if(vmdl)localStorage.setItem('macroai_vmodel',vmdl); else localStorage.removeItem('macroai_vmodel');
  save();generateWeek();go('menu');toast('Impostazioni salvate · menù rigenerato ✅');
}
function resetAll(){if(confirm('Vuoi rifare il questionario iniziale? Le impostazioni attuali verranno usate come base.')){startOnboarding(S);}}

/* ============================================================
   BOOT
   ============================================================ */
function boot(){
  if(S && S.macros){
    document.getElementById('nav').style.display='flex';
    document.getElementById('gearBtn').style.display='flex';
    if(!MENU)generateWeek();
    go('menu');
    initCoach(true);
  } else {
    startOnboarding(null);
  }
}
document.getElementById('chatIn').addEventListener('keypress',e=>{if(e.key==='Enter')coachSend();});

/* Service worker: abilita installazione e uso offline sull'iPhone */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{});});
}
boot();
</script>
</body>
</html>
