<title>Macro AI — Menù Nutrizionale</title>
<style>
:root{
  --bg:#0a0a0a; --card:#161616; --card2:#1f1f1f; --line:#262626;
  --txt:#f5f5f5; --muted:#8a8a8a; --accent:#34d399; --accent2:#22d3ee;
  --pro:#60a5fa; --car:#fbbf24; --fat:#f472b6; --cal:#34d399;
  --danger:#f87171; --warn:#fbbf24;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:520px;margin:0 auto;position:relative;background:var(--bg)}

/* Header */
header{padding:max(14px,env(safe-area-inset-top)) 18px 12px;background:linear-gradient(180deg,#111,#0a0a0a);border-bottom:1px solid var(--line);flex-shrink:0}
.htop{display:flex;align-items:center;justify-content:space-between}
header h1{font-size:19px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.logo{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:15px}
.gear{background:var(--card2);border:none;color:var(--txt);width:36px;height:36px;border-radius:11px;font-size:17px;display:flex;align-items:center;justify-content:center}

/* Content */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.screen{display:none;animation:fade .25s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Bottom nav */
.nav{display:flex;background:#0d0d0d;border-top:1px solid var(--line);padding:8px 8px max(8px,env(safe-area-inset-bottom));flex-shrink:0}
.nav button{flex:1;background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;border-radius:10px;transition:.15s}
.nav button .ic{font-size:20px}
.nav button.active{color:var(--accent)}

/* Cards & generic */
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
.card h2{font-size:16px;font-weight:700;margin-bottom:4px}
.card .sub{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.btn{display:block;width:100%;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04130d;text-align:center;cursor:pointer}
.btn:active{transform:scale(.98)}
.btn.sec{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--txt)}
.btn.danger{background:rgba(248,113,113,.12);color:var(--danger);border:1px solid rgba(248,113,113,.3)}
.btn.sm{padding:9px 14px;font-size:13px;width:auto;display:inline-block;border-radius:11px}
.row{display:flex;gap:10px}
.row .btn{flex:1}

/* Inputs */
label.fld{display:block;margin-bottom:14px}
label.fld .lab{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:7px;display:block}
label.fld .hint{font-size:11.5px;color:var(--muted);font-weight:400}
input[type=text],input[type=number],textarea,select{width:100%;padding:13px 14px;background:var(--card2);border:1px solid var(--line);border-radius:12px;color:var(--txt);font-size:15px;font-family:inherit;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:64px;line-height:1.5}
.stepper{display:flex;align-items:center;gap:14px}
.stepper button{width:42px;height:42px;border-radius:12px;background:var(--card2);border:1px solid var(--line);color:var(--txt);font-size:22px;font-weight:700;flex-shrink:0}
.stepper .val{flex:1;text-align:center;font-size:24px;font-weight:800}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:9px 14px;background:var(--card2);border:1px solid var(--line);border-radius:20px;font-size:13px;font-weight:600;color:var(--muted)}
.chip.on{background:var(--accent);color:#04130d;border-color:var(--accent)}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:13px 0}
.toggle .tlab{font-size:14px;font-weight:600}
.sw{width:50px;height:30px;border-radius:30px;background:var(--card2);border:1px solid var(--line);position:relative;flex-shrink:0;transition:.2s}
.sw.on{background:var(--accent);border-color:var(--accent)}
.sw::after{content:'';position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.2s}
.sw.on::after{left:22px}

/* Onboarding */
.ob-prog{display:flex;gap:5px;margin-bottom:20px}
.ob-prog span{flex:1;height:4px;border-radius:4px;background:var(--card2)}
.ob-prog span.done{background:var(--accent)}
.ob-step{display:none}
.ob-step.active{display:block;animation:fade .25s}
.ob-emoji{font-size:38px;margin-bottom:10px}
.ob-step h2{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.ob-step p.q{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:20px}

/* Macro pills */
.macro-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.mp{background:var(--card2);border-radius:12px;padding:10px 6px;text-align:center}
.mp .v{font-size:17px;font-weight:800}
.mp .l{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.mp.cal .v{color:var(--cal)} .mp.pro .v{color:var(--pro)} .mp.car .v{color:var(--car)} .mp.fat .v{color:var(--fat)}

/* Day cards */
.daysel{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;margin-bottom:4px;-webkit-overflow-scrolling:touch}
.daysel::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;padding:9px 13px;border-radius:12px;background:var(--card2);border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--muted);position:relative;text-align:center;min-width:52px}
.dpill .dd{font-size:10px;font-weight:600;color:var(--muted);display:block}
.dpill.on{background:var(--accent);color:#04130d;border-color:var(--accent)}
.dpill.on .dd{color:#04130d}
.dpill .tdot{position:absolute;top:5px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--accent2)}

.daytitle{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.daytitle h2{font-size:20px;font-weight:800}
.daytag{font-size:11px;font-weight:700;padding:4px 9px;border-radius:8px;background:rgba(52,211,153,.14);color:var(--accent)}
.daytag.rest{background:rgba(96,165,250,.14);color:var(--pro)}
.daytag.special{background:rgba(244,114,182,.14);color:var(--fat)}

/* Target bar */
.tgt{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:14px}
.tgt-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.tgt-h .tt{font-size:12px;color:var(--muted);font-weight:600}
.bar{height:8px;border-radius:8px;background:var(--card2);overflow:hidden;margin:4px 0 2px}
.bar>i{display:block;height:100%;border-radius:8px;transition:.4s}
.barlabel{display:flex;justify-content:space-between;font-size:11px;margin-bottom:8px}
.barlabel b{font-weight:700}

/* Meal card */
.meal{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden}
.meal-h{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;background:var(--card)}
.meal-h .mt{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.meal-h .mc{font-size:12px;color:var(--muted);font-weight:600}
.meal.cheat .meal-h{background:linear-gradient(90deg,rgba(244,114,182,.12),transparent)}
.cheatbadge{font-size:10px;font-weight:800;padding:3px 7px;border-radius:7px;background:var(--fat);color:#1a0410}
.food{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-top:1px solid var(--line)}
.food .fi{flex:1;min-width:0}
.food .fn{font-size:14px;font-weight:600}
.food .fg{font-size:11.5px;color:var(--muted);margin-top:2px}
.food .fmac{display:flex;gap:7px;margin-top:5px;font-size:10.5px;font-weight:700}
.food .fmac .p{color:var(--pro)} .food .fmac .c{color:var(--car)} .food .fmac .f{color:var(--fat)} .food .fmac .k{color:var(--cal)}
.food .fedit{background:var(--card2);border:1px solid var(--line);color:var(--muted);width:32px;height:32px;border-radius:10px;font-size:14px;flex-shrink:0;margin-left:8px}
.meal-foot{display:flex;gap:8px;padding:10px 15px;border-top:1px solid var(--line)}
.meal-foot button{flex:1;background:var(--card2);border:1px solid var(--line);color:var(--txt);padding:9px;border-radius:10px;font-size:12px;font-weight:600}

/* Chat / Coach */
.chat{display:flex;flex-direction:column;height:100%}
.msgs{flex:1;overflow-y:auto;padding:4px 2px 12px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:86%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.msg.ai{background:var(--card);border:1px solid var(--line);border-bottom-left-radius:5px;align-self:flex-start}
.msg.user{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04130d;border-bottom-right-radius:5px;align-self:flex-end;font-weight:600}
.msg.ai b{color:var(--accent)}
.quick{display:flex;gap:7px;overflow-x:auto;padding:8px 0;-webkit-overflow-scrolling:touch}
.quick::-webkit-scrollbar{display:none}
.quick button{flex-shrink:0;background:var(--card2);border:1px solid var(--line);color:var(--txt);padding:8px 13px;border-radius:18px;font-size:12.5px;font-weight:600;white-space:nowrap}
.chatbar{display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--line)}
.chatbar input{flex:1}
.chatbar button{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#04130d;width:48px;border-radius:12px;font-size:18px;font-weight:700;flex-shrink:0}

/* Shopping & recipes */
.cat-h{font-size:13px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.shop-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:8px}
.shop-item .ck{width:24px;height:24px;border-radius:8px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent}
.shop-item.done .ck{background:var(--accent);border-color:var(--accent);color:#04130d}
.shop-item.done .si-n{text-decoration:line-through;color:var(--muted)}
.shop-item .si-n{flex:1;font-size:14px;font-weight:600}
.shop-item .si-q{font-size:12px;color:var(--muted);font-weight:600}
.recipe{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:12px}
.recipe .rh{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.recipe .rh .rt{font-size:15px;font-weight:700}
.recipe .af{font-size:10px;font-weight:800;padding:3px 8px;border-radius:7px;background:rgba(34,211,238,.14);color:var(--accent2)}
.recipe .ring{font-size:12.5px;color:var(--muted);line-height:1.6}
.recipe .rsteps{font-size:13px;line-height:1.6;margin-top:8px;color:var(--txt)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:50;display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex;animation:fade .2s}
.modal{background:var(--card);border:1px solid var(--line);border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:18px 18px max(18px,env(safe-area-inset-bottom));animation:slideup .28s cubic-bezier(.2,.9,.3,1)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.modal .grab{width:38px;height:4px;border-radius:4px;background:var(--line);margin:0 auto 14px}
.modal h3{font-size:18px;font-weight:800;margin-bottom:4px}
.modal .msub{font-size:13px;color:var(--muted);margin-bottom:16px}
.altlist{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.alt{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--card2);border:1px solid var(--line);border-radius:13px}
.alt .an{font-size:14px;font-weight:600}
.alt .am{font-size:11px;color:var(--muted);margin-top:2px}
.alt button{background:var(--accent);border:none;color:#04130d;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:700;flex-shrink:0;margin-left:8px}
.divlbl{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;display:flex;align-items:center;gap:10px}
.divlbl::before,.divlbl::after{content:'';flex:1;height:1px;background:var(--line)}
.note{font-size:12px;color:var(--muted);line-height:1.5;background:var(--card2);border-radius:10px;padding:10px 12px;margin-top:10px}

.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .ee{font-size:46px;margin-bottom:12px}
.empty h3{font-size:17px;font-weight:700;color:var(--txt);margin-bottom:6px}
.empty p{font-size:13px;line-height:1.5}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#04130d;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:700;z-index:100;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(4,19,13,.3);border-top-color:#04130d;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}

/* Print */
#printArea{display:none}
@media print{
  body *{visibility:hidden}

  #printArea{display:block;position:absolute;left:0;top:0;width:100%;padding:24px;background:#fff;color:#000;font-size:12px}

}

/* ---------- ALIMENTI PERSONALIZZATI (salvati in locale) ----------
   FOODS = database di base (DB) + alimenti creati/modificati dall'utente.
   Un alimento custom con lo stesso nome SOVRASCRIVE quello di base. */
let CUSTOM=(()=>{try{return JSON.parse(localStorage.getItem('macroai_foods'))||[]}catch(e){return []}})();
let FOODS=[];
function rebuildFoods(){
  // preserva l'ordine del DB di base (il generatore vi fa affidamento per la varietà):
  // override sul posto, nuovi alimenti in coda.
  const cByName={};CUSTOM.forEach(f=>cByName[f.n]=f);
  FOODS=DB.map(f=>cByName[f.n]||f);
  CUSTOM.forEach(f=>{ if(!DB.some(b=>b.n===f.n))FOODS.push(f); });
}
function saveCustomFoods(){localStorage.setItem('macroai_foods',JSON.stringify(CUSTOM));rebuildFoods();}
function isCustom(n){return CUSTOM.some(f=>f.n===n);}
// crea o aggiorna un alimento personalizzato
function upsertFood(food){
  const i=CUSTOM.findIndex(f=>f.n===food.n);
  if(i>=0)CUSTOM[i]=food; else CUSTOM.push(food);
  saveCustomFoods();
}
function deleteCustomFood(n){CUSTOM=CUSTOM.filter(f=>f.n!==n);saveCustomFoods();}
rebuildFoods();
const findFood=n=>FOODS.find(x=>x.n===n);

function go(sc){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));

  if(sc==='menu')renderMenu();
  if(sc==='shop')renderShop();
  if(sc==='diario')renderDiario();
  if(sc==='recipes')renderRecipes();
  if(sc==='settings')renderSettings();
}

  document.getElementById('gearBtn').style.display = existing?'flex':'none';
  renderOb();
}

  let h='';for(let i=0;i<OB_TOTAL;i++)h+=`<span class="${i<=ob.step?'done':''}"></span>`;

function doMacroCalc(mode){
  const sex=document.getElementById('mc_sex').value;
  const age=+document.getElementById('mc_age').value||30;
  const w=+document.getElementById('mc_w').value||75;
  const ht=+document.getElementById('mc_h').value||175;
  const act=+document.getElementById('mc_act').value;
  const goal=+document.getElementById('mc_goal').value;
  // Mifflin-St Jeor
  let bmr=10*w+6.25*ht-5*age+(sex==='m'?5:-161);
  let kcal=bmr*act*(1+goal);
  // split: proteine 2g/kg, grassi 0.9g/kg, resto carbo
  const p=Math.round(2*w);
  const f=Math.round(0.9*w);
  const c=Math.max(50,Math.round((kcal-(p*4+f*9))/4));
  document.getElementById('mc_out').innerHTML=`Stima: <b>${kcalFromMacros(p,c,f)} kcal</b> · P<b>${p}</b> C<b>${c}</b> G<b>${f}</b> g`;
  // applica
  if(mode==='ob'){
    ob.data.macros.train={p,c,f};
    ob.data.macros.rest={p,c:Math.round(c*0.65),f}; // riposo: meno carbo
    setTimeout(()=>{closeModal();renderOb();toast('Macro calcolati e applicati ✅');},700);
  } else {
    S.macros.train={p,c,f};
    S.macros.rest=S.twoMenus?{p,c:Math.round(c*0.65),f}:{p,c,f};
    setTimeout(()=>{closeModal();renderSettings();toast('Macro calcolati ✅ — premi Salva');},700);
  }
}

function mealNamesFor(n){

    7:['Colazione','Spuntino','Pranzo','Spuntino','Merenda','Cena','Spuntino serale']};

}

/* ============================================================
   GENERATORE MENÙ  (rispetta i macro)
   ============================================================ */
function dayTarget(dayIdx){
  const sp=S.specialDays.find(s=>s.day===dayIdx);
  if(sp)return {p:sp.p,c:sp.c,f:sp.f,type:'special',label:sp.name};
  const isTrain = S.twoMenus ? S.trainingList.includes(dayIdx) : true;
  const m=isTrain?S.macros.train:S.macros.rest;
  return {p:m.p,c:m.c,f:m.f,type:isTrain?'train':'rest',label:isTrain?'Allenamento':'Riposo'};
}

// alimenti consentiti (no allergeni, no sgraditi)
function allowed(cat,dayIdx,seed){
  const algText=(S.allergies||'').toLowerCase();
  const disText=(S.dislikes||'').toLowerCase();
  return FOODS.filter(f=>f.cat===cat).filter(f=>{
    // allergeni
    for(const a of f.alg){ if(algText.includes(a.toLowerCase().split(' ')[0]))return false; }
    if(algText.includes('lattosio')&&f.cat==='dairy')return false;
    if(algText.includes('glutine')&&f.alg.includes('glutine'))return false;
    // sgraditi: match parola del nome
    const words=f.n.toLowerCase().split(/[ ’']/);
    for(const w of words){ if(w.length>3 && disText.includes(w))return false; }
    if(disText.includes(f.n.toLowerCase()))return false;
    return true;
  });
}
function pick(arr,seed){ return arr.length?arr[seed%arr.length]:null; }

// distribuisci macro del giorno tra i pasti
function mealSplit(meals,cheatIdx){
  // pesi tipici per ruolo
  const base={2:[.45,.55],3:[.3,.4,.3],4:[.25,.35,.12,.28],5:[.22,.1,.32,.1,.26],6:[.2,.1,.28,.1,.22,.1],7:[.18,.08,.26,.1,.1,.2,.08]};
  let w=base[meals]||Array.from({length:meals},()=>1/meals);
  return w;
}

const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

function buildMeal(target,dayIdx,mealIdx,role){
  // target {p,c,f}; costruisce alimenti e quantità per avvicinarsi
  const seed=dayIdx*7+mealIdx;
  const isBk = role==='Colazione';
  let fixed=[];
  // VERDURA fissa (no colazione) / FRUTTA a colazione
  if(!isBk){
    const veg=pick(allowed('veg'),seed+dayIdx);
    if(veg)fixed.push({food:veg.n,g:150});
  } else {
    const fruit=pick(allowed('fruit'),seed);
    if(fruit)fixed.push({food:fruit.n,g:120});
  }
  // contributo macro degli alimenti fissi
  const fixedMac=()=>{let b={p:0,c:0,f:0};fixed.forEach(x=>{const ff=findFood(x.food);b.p+=ff.p*x.g/100;b.c+=ff.c*x.g/100;b.f+=ff.f*x.g/100;});return b;};

  // PROTEINA: scelgo varietà ma evito proteine troppo grasse se il budget di grassi è basso
  let pros=allowed('pro').concat(allowed('dairy'));
  if(isBk){const bp=pros.filter(f=>f.tags&&f.tags.includes('bk'));if(bp.length)pros=bp;}
  let pro=pickLeanProtein(pros,target,fixedMac(),seed+1);
  // CARBO
  let carbs=allowed('carb');
  if(isBk){const bc=carbs.filter(f=>f.tags&&f.tags.includes('bk'));if(bc.length)carbs=bc;}
  const carb=pick(carbs,seed+3);
  // GRASSO
  let fats=allowed('fat');
  if(isBk){const bf=fats.filter(f=>f.tags&&f.tags.includes('bk'));if(bf.length)fats=bf;}
  const fat=pick(fats,seed+2);

  // risoluzione iterativa: ogni macro è dominato da una fonte, in poche iterazioni converge
  let gP=120,gC=120,gF=8;
  for(let it=0;it<6;it++){
    const b=fixedMac();
    if(pro){const cP=carb?carb.p*gC/100:0,fP=fat?fat.p*gF/100:0;gP=clamp(round5((target.p-b.p-cP-fP)/(pro.p/100||1)),20,400);}
    if(carb){const pC=pro?pro.c*gP/100:0,fC=fat?fat.c*gF/100:0;gC=clamp(round5((target.c-b.c-pC-fC)/(carb.c/100||1)),10,400);}
    if(fat){const pF=pro?pro.f*gP/100:0,cF=carb?carb.f*gC/100:0;const need=target.f-b.f-pF-cF;gF=clamp(round5(need/(fat.f/100||1)),need>3?5:0,fat.f>=90?25:90);}
  }
  let foods=fixed.map(x=>({food:x.food,g:x.g,locked:false}));
  if(pro)foods.push({food:pro.n,g:gP,locked:false});
  if(carb)foods.push({food:carb.n,g:gC,locked:false});
  if(fat&&gF>0)foods.push({food:fat.n,g:gF,locked:false});
  return {name:role,foods,cheat:false};
}

// sceglie una proteina variata ma compatibile col budget di grassi del pasto
function pickLeanProtein(list,target,base,seed){
  if(!list.length)return null;
  const budget=Math.max(6,(target.f-base.f)*0.7); // grasso che la proteina può "spendere"
  const n=list.length;
  for(let k=0;k<n;k++){
    const cand=list[(seed+k)%n];
    const g=cand.p>0?(target.p-base.p)/(cand.p/100):0;
    if((cand.f*g/100)<=budget)return cand; // prima candidata abbastanza magra
  }
  // nessuna rientra: prendo la più magra in assoluto
  return list.slice().sort((a,b)=>a.f-b.f)[0];
}

function generateWeek(){
  MENU={days:[]};
  const mealW=mealSplit(S.meals);
  const names=S.mealNames&&S.mealNames.length?S.mealNames:mealNamesFor(S.meals);
  for(let d=0;d<7;d++){
    const tgt=dayTarget(d);
    let dayMeals=[];
    // togli macro sgarro dal target se è in questo giorno
    let eff={p:tgt.p,c:tgt.c,f:tgt.f};
    const hasCheat = S.cheat.enabled && S.cheat.day===d;
    if(hasCheat){ eff={p:Math.max(0,tgt.p-S.cheat.p),c:Math.max(0,tgt.c-S.cheat.c),f:Math.max(0,tgt.f-S.cheat.f)}; }
    const otherMeals = hasCheat? S.meals-1 : S.meals;
    // ridistribuisci pesi sui pasti non-sgarro
    let wsum=0; mealW.forEach((w,i)=>{ if(!(hasCheat&&i===S.cheat.mealIndex))wsum+=w; });
    for(let m=0;m<S.meals;m++){
      if(hasCheat && m===S.cheat.mealIndex){
        dayMeals.push({name:names[m],cheat:true,desc:S.cheat.desc||'Pasto libero',
          foods:[{food:'__cheat__',label:S.cheat.desc||'Pasto libero (sgarro)',g:null,p:S.cheat.p,c:S.cheat.c,f:S.cheat.f,locked:true}]});
        continue;
      }
      const w=mealW[m]/wsum;
      const mt={p:eff.p*w,c:eff.c*w,f:eff.f*w};
      dayMeals.push(buildMeal(mt,d,m,names[m]));
    }
    MENU.days.push({meals:dayMeals});
  }
  saveMenu();
}

/* calcola macro di un alimento riga */
function foodMacros(item){
  if(item.food==='__cheat__'){return {k:kcalFromMacros(item.p,item.c,item.f),p:item.p,c:item.c,f:item.f};}
  const ff=findFood(item.food);if(!ff)return {k:0,p:0,c:0,f:0};
  const g=item.g||0;
  return {k:Math.round(ff.k*g/100),p:+(ff.p*g/100).toFixed(1),c:+(ff.c*g/100).toFixed(1),f:+(ff.f*g/100).toFixed(1)};
}
function mealMacros(meal){let t={k:0,p:0,c:0,f:0};meal.foods.forEach(it=>{const m=foodMacros(it);t.k+=m.k;t.p+=m.p;t.c+=m.c;t.f+=m.f;});return {k:Math.round(t.k),p:Math.round(t.p),c:Math.round(t.c),f:Math.round(t.f)};}
function dayMacros(dayIdx){let t={k:0,p:0,c:0,f:0};MENU.days[dayIdx].meals.forEach(meal=>{const m=mealMacros(meal);t.k+=m.k;t.p+=m.p;t.c+=m.c;t.f+=m.f;});return t;}

/* ============================================================
   RENDER MENÙ
   ============================================================ */
function renderMenu(){
  if(!MENU){document.getElementById('sc-menu').innerHTML='';return;}
  const tgt=dayTarget(curDay);
  const got=dayMacros(curDay);
  const day=MENU.days[curDay];
  const tagClass=tgt.type==='rest'?'rest':tgt.type==='special'?'special':'';

  let h=`<div class="daysel">${DAYS.map((dd,i)=>{
      const t=dayTarget(i);const tr=t.type==='train';
      return `<div class="dpill ${i===curDay?'on':''}" onclick="curDay=${i};renderMenu()">${tr?'<span class="tdot"></span>':''}<span class="dd">${DSHORT[i]}</span></div>`;
    }).join('')}</div>`;

  h+=`<div class="daytitle"><h2>${DAYS[curDay]}</h2><span class="daytag ${tagClass}">${tgt.label}</span></div>`;

  // target progress
  h+=`<div class="tgt">
    <div class="tgt-h"><span class="tt">Obiettivo giornaliero</span><span class="tt" style="color:var(--cal);font-weight:700">${got.k} / ${kcalFromMacros(tgt.p,tgt.c,tgt.f)} kcal</span></div>
    ${macroBar('Proteine',got.p,tgt.p,'var(--pro)')}
    ${macroBar('Carboidrati',got.c,tgt.c,'var(--car)')}
    ${macroBar('Grassi',got.f,tgt.f,'var(--fat)')}
  </div>`;

  // tracker acqua (solo per il giorno di oggi)
  if(curDay===((new Date().getDay()+6)%7)){
    const w=waterGet();
    h+=`<div class="tgt" style="display:flex;align-items:center;justify-content:space-between;gap:12px">
      <div><div style="font-size:13px;font-weight:700">💧 Acqua di oggi</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px">${(w*0.25).toFixed(2)} L · obiettivo 2 L</div>
        <div style="font-size:16px;margin-top:6px;letter-spacing:1px">${'🥛'.repeat(Math.min(w,8))}${'·'.repeat(Math.max(0,8-w))}</div></div>
      <div class="stepper" style="gap:8px"><button onclick="waterAdd(-1)">−</button><div class="val" style="font-size:20px;min-width:34px">${w}</div><button onclick="waterAdd(1)">+</button></div>
    </div>`;
  }

  // meals
  day.meals.forEach((meal,mi)=>{
    const mm=mealMacros(meal);
    h+=`<div class="meal ${meal.cheat?'cheat':''}">
      <div class="meal-h">
        <span class="mt">${mealEmoji(meal.name)} ${meal.name} ${meal.cheat?'<span class="cheatbadge">SGARRO</span>':''}</span>
        <span class="mc">${mm.k} kcal · P${mm.p} C${mm.c} G${mm.f}</span>
      </div>`;
    meal.foods.forEach((it,fi)=>{
      const m=foodMacros(it);
      if(it.food==='__cheat__'){
        h+=`<div class="food"><div class="fi"><div class="fn">🍕 ${it.label}</div>
          <div class="fg">Pasto libero · conteggiato nei macro</div>
          <div class="fmac"><span class="k">${m.k}kcal</span><span class="p">P ${m.p}</span><span class="c">C ${m.c}</span><span class="f">G ${m.f}</span></div></div>
          <button class="fedit" onclick="editCheat(${curDay},${mi})">✏️</button></div>`;
      } else {
        h+=`<div class="food"><div class="fi"><div class="fn">${it.food}</div>
          <div class="fg">${it.g} g a crudo</div>
          <div class="fmac"><span class="k">${m.k}kcal</span><span class="p">P ${m.p}</span><span class="c">C ${m.c}</span><span class="f">G ${m.f}</span></div></div>
          <button class="fedit" onclick="editFood(${curDay},${mi},${fi})">✏️</button></div>`;
      }
    });
    h+=`<div class="meal-foot">
        <button onclick="logMeal(${curDay},${mi})">✓ Mangiato</button>
        <button onclick="addFood(${curDay},${mi})">＋ Alimento</button>
        ${!meal.cheat?`<button onclick="regenMeal(${curDay},${mi})">🔄 Rigenera</button>`:''}
      </div></div>`;
  });

  h+=`<button class="btn ghost" style="margin-bottom:10px" onclick="addMeal(${curDay})">＋ Aggiungi pasto extra</button>`;
  h+=`<div class="row" style="margin-bottom:10px">
      <button class="btn sec" onclick="regenDay(${curDay})">🔄 Rigenera giorno</button>
      <button class="btn sec" onclick="regenAll()">🔁 Rigenera settimana</button>
    </div>`;

  // riepilogo settimanale (medie)
  const wk=weekAvg();
  h+=`<div class="card" style="margin-top:4px">
    <h2>📊 Media settimanale</h2>
    <div class="sub">Valori medi giornalieri del tuo menù.</div>
    <div class="macro-row">
      <div class="mp cal"><div class="v">${wk.k}</div><div class="l">kcal</div></div>
      <div class="mp pro"><div class="v">${wk.p}</div><div class="l">Pro</div></div>
      <div class="mp car"><div class="v">${wk.c}</div><div class="l">Carbo</div></div>
      <div class="mp fat"><div class="v">${wk.f}</div><div class="l">Grassi</div></div>
    </div>
  </div>`;

  h+=`<div class="row" style="margin-bottom:10px">
      <button class="btn" onclick="printMenu()">🖨️ Stampa</button>
      <button class="btn sec" onclick="downloadMenu()">⬇️ Scarica</button>
    </div>`;
  h+=`<button class="btn ghost" style="margin-bottom:24px" onclick="shareMenu()">📤 Condividi il menù</button>`;

  document.getElementById('sc-menu').innerHTML=h;
}
function weekAvg(){let t={k:0,p:0,c:0,f:0};for(let d=0;d<7;d++){const m=dayMacros(d);t.k+=m.k;t.p+=m.p;t.c+=m.c;t.f+=m.f;}return {k:Math.round(t.k/7),p:Math.round(t.p/7),c:Math.round(t.c/7),f:Math.round(t.f/7)};}

/* ---- Tracker acqua (per data) ---- */
function todayKey(){return new Date().toISOString().slice(0,10);}
function waterGet(){try{const w=JSON.parse(localStorage.getItem('macroai_water'))||{};return w[todayKey()]||0;}catch(e){return 0;}}
function waterAdd(d){let w={};try{w=JSON.parse(localStorage.getItem('macroai_water'))||{};}catch(e){}w[todayKey()]=Math.max(0,(w[todayKey()]||0)+d);localStorage.setItem('macroai_water',JSON.stringify(w));renderMenu();}

/* ---- Condividi (Web Share API, ottimo su iPhone) ---- */
async function shareMenu(){
  if(!MENU)return;
  const txt=menuText();
  if(navigator.share){try{await navigator.share({title:'Il mio menù — Macro AI',text:txt});}catch(e){}}
  else{downloadMenu();toast('Condivisione non disponibile · scaricato');}
}
function macroBar(lbl,got,tgt,col){
  const pct=tgt>0?Math.min(100,Math.round(got/tgt*100)):0;
  const over=got>tgt*1.08;
  return `<div class="barlabel"><span>${lbl}</span><b style="color:${col}">${Math.round(got)} / ${tgt} g</b></div>
    <div class="bar"><i style="width:${pct}%;background:${over?'var(--danger)':col}"></i></div>`;
}
function mealEmoji(n){n=n.toLowerCase();if(n.includes('colaz'))return'☀️';if(n.includes('pranzo'))return'🍝';if(n.includes('cena'))return'🌙';if(n.includes('spunt')||n.includes('meren'))return'🍎';return'🍽️';}

/* ============================================================
   EDITING ALIMENTI
   ============================================================ */
function editFood(d,mi,fi){
  const it=MENU.days[d].meals[mi].foods[fi];
  const ff=findFood(it.food);
  const m=foodMacros(it);
  // alternative stessa categoria
  const alts=allowed(ff.cat).filter(a=>a.n!==it.food).slice(0,6);
  let h=`<h3>${it.food}</h3><div class="msub">${it.g} g a crudo · ${m.k}kcal · P${m.p} C${m.c} G${m.f}</div>`;
  h+=`<label class="fld"><span class="lab">Quantità (g a crudo) <span class="hint">— se la cambi, ricalcolo le kcal</span></span>
      <div class="row" style="gap:8px"><input type="number" id="ed_g" value="${it.g}"><button class="btn sm" style="padding:13px 16px" onclick="setQty(${d},${mi},${fi})">OK</button></div></label>`;
  h+=`<div class="divlbl">alternative consigliate</div><div class="altlist">`;
  alts.forEach(a=>{
    // mantieni stessi macro: scala la quantità per pareggiare le kcal
    const newG=round5(it.g*(ff.k)/(a.k||1));
    h+=`<div class="alt"><div><div class="an">${a.n}</div><div class="am">~${newG} g · ${Math.round(a.k*newG/100)}kcal · P${(a.p*newG/100).toFixed(0)} C${(a.c*newG/100).toFixed(0)} G${(a.f*newG/100).toFixed(0)}</div></div>
      <button onclick="swapFood(${d},${mi},${fi},'${a.n.replace(/'/g,"\\'")}')">Sostituisci</button></div>`;
  });
  h+=`</div>`;
  h+=`<div class="divlbl">non ti va nessuna?</div>
    <label class="fld"><span class="lab">Cerca un altro prodotto</span>
      <input type="text" id="ed_search" placeholder="Scrivi un alimento…" oninput="searchAlt(${d},${mi},${fi},this.value)"></label>
    <div id="ed_results"></div>
    <div class="note">Quando sostituisci o cambi quantità, <b>riadatto automaticamente gli altri alimenti del pasto</b> per centrare i tuoi macro giornalieri.</div>`;
  h+=`<button class="btn sec" style="margin-top:14px" onclick="editFoodValues('${it.food.replace(/'/g,"\\'")}',null)">✏️ Modifica valori (P/C/G/kcal) di ${it.food}</button>`;
  h+=`<button class="btn danger" style="margin-top:10px" onclick="removeFood(${d},${mi},${fi})">🗑️ Rimuovi dal pasto</button>`;
  openModal(h);
}
function setQty(d,mi,fi){
  const g=+document.getElementById('ed_g').value||0;
  MENU.days[d].meals[mi].foods[fi].g=g;
  MENU.days[d].meals[mi].foods[fi].locked=true;
  rebalanceMeal(d,mi,fi);
  saveMenu();closeModal();renderMenu();toast('Quantità aggiornata · pasto riadattato');
}
function swapFood(d,mi,fi,name){
  const old=MENU.days[d].meals[mi].foods[fi];
  const oldM=foodMacros(old);const nf=findFood(name);
  // mantieni le kcal simili
  let g=round5(old.g*(findFood(old.food).k)/(nf.k||1));
  MENU.days[d].meals[mi].foods[fi]={food:name,g,locked:false};
  rebalanceMeal(d,mi,fi);
  saveMenu();closeModal();renderMenu();toast('Sostituito con '+name);
}
function searchAlt(d,mi,fi,q){
  q=q.trim().toLowerCase();const box=document.getElementById('ed_results');
  if(q.length<2){box.innerHTML='';return;}
  const res=FOODS.filter(f=>f.n.toLowerCase().includes(q)).slice(0,6);
  if(!res.length){box.innerHTML='<div class="note">Nessun alimento trovato. Prova con un altro nome.</div>';return;}
  box.innerHTML='<div class="altlist">'+res.map(a=>`<div class="alt"><div><div class="an">${a.n}</div><div class="am">${a.k}kcal/100g · P${a.p} C${a.c} G${a.f}</div></div>
    <button onclick="swapFood(${d},${mi},${fi},'${a.n.replace(/'/g,"\\'")}')">Scegli</button></div>`).join('')+'</div>';
}
function removeFood(d,mi,fi){
  MENU.days[d].meals[mi].foods.splice(fi,1);
  saveMenu();closeModal();renderMenu();toast('Alimento rimosso');
}
function addFood(d,mi){
  let h=`<h3>Aggiungi alimento</h3><div class="msub">Scegli un alimento o creane uno nuovo (resta salvato)</div>
    <label class="fld"><input type="text" id="af_search" placeholder="Cerca alimento…" oninput="afSearch(${d},${mi},this.value)" autofocus></label>
    <div class="row" style="gap:8px;margin-bottom:10px">
      <button class="btn sec sm" style="flex:1" onclick="scanBarcode({d:${d},mi:${mi}})">📷 Scansiona barcode</button>
      <button class="btn ghost sm" style="flex:1" onclick="editFoodValues(null,{d:${d},mi:${mi}})">＋ Nuovo</button>
    </div>
    <div id="af_results"></div>`;
  openModal(h);afSearch(d,mi,'');
}
function afSearch(d,mi,q){
  q=q.trim().toLowerCase();
  let res=q.length<1?FOODS.slice(0,40):FOODS.filter(f=>f.n.toLowerCase().includes(q));
  res=res.slice(0,30);
  document.getElementById('af_results').innerHTML='<div class="altlist">'+res.map(a=>`<div class="alt"><div><div class="an">${a.n}</div><div class="am">${a.k}kcal/100g · P${a.p} C${a.c} G${a.f}</div></div>
    <button onclick="doAddFood(${d},${mi},'${a.n.replace(/'/g,"\\'")}')">＋</button></div>`).join('')+'</div>';
}
function doAddFood(d,mi,name){
  const nf=findFood(name);
  const g=nf.por?round5(nf.por):(nf.cat==='fat'&&nf.f>=90?10:nf.cat==='veg'?100:80);
  MENU.days[d].meals[mi].foods.push({food:name,g,locked:true});
  saveMenu();closeModal();renderMenu();toast(name+' aggiunto'+(nf.por?` (${g} g)`:''));
}

/* ============================================================
   GESTIONE ALIMENTI  (crea / modifica / elimina, con salvataggio)
   ============================================================ */
const FOOD_CATS={pro:'Proteine',carb:'Carboidrati',fat:'Grassi',veg:'Verdura',fruit:'Frutta',dairy:'Latticini'};
const ALG_LIST=['glutine','lattosio','uova','pesce','crostacei','frutta a guscio','soia','arachidi'];

// editor valori alimento. name=null → nuovo. ctx: {d,mi} aggiungi al pasto · {diary:true} · {manager:true}
// preset: valori precompilati (es. da barcode) {n,k,p,c,f,cat,alg,bc}
let _editBc=null;
function editFoodValues(name,ctx,preset){
  const f=name?findFood(name):(preset||null);
  _editBc=(f&&f.bc)||null;
  const cat=f?f.cat:'pro', alg=f?(f.alg||[]):[];
  const title=name?'Modifica alimento':(preset?'Nuovo alimento (da barcode)':'Nuovo alimento');
  let h=`<h3>${title}</h3>
   <div class="msub">Valori <b>per 100 g</b>. Puoi correggere tutto. L’alimento resta salvato e comparirà nella ricerca${_editBc?` (codice ${_editBc})`:''}.</div>
   <label class="fld"><span class="lab">Nome</span><input type="text" id="fv_n" value="${((name||(f&&f.n)||'')+'').replace(/"/g,'&quot;')}" placeholder="es. Skyr alla vaniglia"></label>
   <label class="fld"><span class="lab">Categoria</span><select id="fv_cat">${Object.entries(FOOD_CATS).map(([v,l])=>`<option value="${v}" ${cat===v?'selected':''}>${l}</option>`).join('')}</select></label>
   <div class="row" style="gap:8px">
     <label class="fld" style="flex:1"><span class="lab" style="color:var(--pro)">Proteine</span><input type="number" step="0.1" id="fv_p" value="${f?f.p:''}" oninput="fvCalc()"></label>
     <label class="fld" style="flex:1"><span class="lab" style="color:var(--car)">Carboidrati</span><input type="number" step="0.1" id="fv_c" value="${f?f.c:''}" oninput="fvCalc()"></label>
     <label class="fld" style="flex:1"><span class="lab" style="color:var(--fat)">Grassi</span><input type="number" step="0.1" id="fv_f" value="${f?f.f:''}" oninput="fvCalc()"></label>
   </div>
   <label class="fld"><span class="lab">kcal per 100 g <span class="hint">— calcolate dai macro se la lasci vuota</span></span>
     <div class="row" style="gap:8px"><input type="number" id="fv_k" value="${f?f.k:''}" placeholder="auto"><button class="btn sm sec" style="padding:13px 14px;flex:0 0 auto" onclick="fvCalc(true)">Calcola</button></div></label>
   <span class="lab" style="font-size:13px;font-weight:600;display:block;margin-bottom:8px">Porzione predefinita <span class="hint">(facoltativa) — usata come quantità di partenza</span></span>
   <div class="row" style="gap:8px;margin-bottom:14px">
     <label class="fld" style="flex:1;margin:0"><span class="lab">Grammi</span><input type="number" id="fv_por" value="${f&&f.por?f.por:''}" placeholder="es. 125"></label>
     <label class="fld" style="flex:1.4;margin:0"><span class="lab">Nome porzione</span><input type="text" id="fv_porl" value="${f&&f.porl?(''+f.porl).replace(/"/g,'&quot;'):''}" placeholder="es. vasetto, fetta, uovo"></label>
   </div>
   <span class="lab" style="font-size:13px;font-weight:600;display:block;margin-bottom:8px">Allergeni contenuti (per allergie e filtri)</span>
   <div class="chips" id="fv_alg">${ALG_LIST.map(a=>`<div class="chip ${alg.includes(a)?'on':''}" onclick="this.classList.toggle('on')" data-a="${a}">${a}</div>`).join('')}</div>
   <button class="btn" style="margin-top:16px" onclick='saveFoodValues(${JSON.stringify(name)},${JSON.stringify(ctx||null)})'>💾 Salva alimento</button>`;
  if(name&&isCustom(name))h+=`<button class="btn danger" style="margin-top:10px" onclick='deleteFoodPrompt(${JSON.stringify(name)})'>🗑️ Elimina alimento</button>`;
  else if(name)h+=`<div class="note" style="margin-top:10px">Stai modificando un alimento di base: salverò una tua versione personalizzata (potrai ripristinarla eliminandola).</div>`;
  openModal(h);
}
function fvCalc(force){
  const p=+document.getElementById('fv_p').value||0,c=+document.getElementById('fv_c').value||0,f=+document.getElementById('fv_f').value||0;
  const kEl=document.getElementById('fv_k');
  if(force||!kEl.value)kEl.value=kcalFromMacros(p,c,f);
}
function saveFoodValues(orig,ctx){
  const n=document.getElementById('fv_n').value.trim();
  if(!n){toast('Inserisci un nome');return;}
  const p=+document.getElementById('fv_p').value||0,c=+document.getElementById('fv_c').value||0,f=+document.getElementById('fv_f').value||0;
  let k=+document.getElementById('fv_k').value; if(!k)k=kcalFromMacros(p,c,f);
  const cat=document.getElementById('fv_cat').value;
  const alg=[...document.querySelectorAll('#fv_alg .chip.on')].map(x=>x.dataset.a);
  if(orig && orig!==n && isCustom(orig))deleteCustomFood(orig); // rinominato
  const food={n,k:Math.round(k),p:+p,c:+c,f:+f,cat,alg};
  if(_editBc)food.bc=_editBc;       // mantieni il codice a barre (riconoscimento offline)
  _editBc=null;
  const por=+document.getElementById('fv_por').value||0;
  const porl=document.getElementById('fv_porl').value.trim();
  if(por>0)food.por=por; if(porl)food.porl=porl;
  upsertFood(food);
  closeModal();toast('Alimento salvato ✓');
  if(ctx&&ctx.d!=null){doAddFood(ctx.d,ctx.mi,n);return;}
  if(ctx&&ctx.diary){diaPick(n);return;}
  if(ctx&&ctx.manager){openFoodManager();return;}
  if(MENU)renderMenu();           // aggiorna i macro nei pasti che usano l'alimento
}
function deleteFoodPrompt(n){
  if(confirm('Eliminare "'+n+'"? Verrà tolto dalla ricerca. (Se è una modifica di un alimento di base, torna ai valori originali.)')){
    deleteCustomFood(n);closeModal();toast('Alimento eliminato');
    if(document.getElementById('fm_search'))openFoodManager(); else if(MENU)renderMenu();
  }
}
function openFoodManager(){
  let h=`<h3>🍎 I miei alimenti</h3>
   <div class="msub">Crea, modifica ed elimina alimenti. Quelli che salvi restano e compaiono sempre nella ricerca. Hai ${CUSTOM.length} aliment${CUSTOM.length===1?'o':'i'} personalizzat${CUSTOM.length===1?'o':'i'}.</div>
   <div class="row" style="gap:8px;margin-bottom:12px">
     <button class="btn sec" style="flex:1" onclick="scanBarcode({manager:true})">📷 Scansiona barcode</button>
     <button class="btn" style="flex:1" onclick="editFoodValues(null,{manager:true})">＋ Nuovo</button>
   </div>
   <label class="fld"><input type="text" id="fm_search" placeholder="Cerca tra tutti gli alimenti…" oninput="fmSearch(this.value)"></label>
   <div id="fm_results"></div>`;
  openModal(h);fmSearch('');
}
function fmSearch(q){
  q=q.trim().toLowerCase();
  let res=(q.length<1?FOODS.slice():FOODS.filter(f=>f.n.toLowerCase().includes(q)))
    .sort((a,b)=>a.n.localeCompare(b.n,'it')).slice(0,80);
  const box=document.getElementById('fm_results');if(!box)return;
  box.innerHTML='<div class="altlist">'+res.map(a=>`<div class="alt"><div><div class="an">${a.n} ${isCustom(a.n)?'<span style="color:var(--accent2);font-size:10px;font-weight:700">• TUO</span>':''}</div><div class="am">${FOOD_CATS[a.cat]||a.cat} · ${a.k}kcal/100g · P${a.p} C${a.c} G${a.f}${a.por?` · 🍽️ ${a.por}g`:''}</div></div>
    <button onclick='editFoodValues(${JSON.stringify(a.n)},{manager:true})'>✏️</button></div>`).join('')+'</div>'
    +(res.length?'':'<div class="note">Nessun alimento. Tocca “Nuovo alimento” per crearlo.</div>');
}

/* ============================================================
   SCANSIONE CODICE A BARRE  (camera + Open Food Facts)
   ============================================================ */
let _zxReader=null;
function stopScan(){try{_zxReader&&_zxReader.reset();}catch(e){}_zxReader=null;}
function loadZXing(){
  return new Promise((res,rej)=>{
    if(window.ZXing)return res(window.ZXing);
    const s=document.createElement('script');
    s.src='https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js';
    s.onload=()=>window.ZXing?res(window.ZXing):rej(new Error('noglobal')); s.onerror=()=>rej(new Error('cdn'));
    document.head.appendChild(s);
  });
}
async function scanBarcode(ctx){
  const cx=JSON.stringify(ctx||null);
  openModal(`<h3>📷 Scansiona codice a barre</h3>
    <div class="msub">Inquadra il codice a barre del prodotto con la fotocamera.</div>
    <div style="position:relative;background:#000;border-radius:14px;overflow:hidden;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center">
      <video id="bc_video" playsinline muted style="width:100%;height:100%;object-fit:cover"></video>
      <div style="position:absolute;width:70%;height:32%;border:2px solid rgba(52,211,153,.9);border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,.25)"></div>
      <div id="bc_status" style="position:absolute;bottom:8px;color:#fff;font-size:12px;background:rgba(0,0,0,.55);padding:6px 10px;border-radius:8px">Avvio fotocamera…</div>
    </div>
    <div class="divlbl">oppure inserisci il codice a mano</div>
    <label class="fld" style="margin:0"><div class="row" style="gap:8px">
      <input type="number" id="bc_manual" placeholder="es. 8001234567890" enterkeyhint="search">
      <button class="btn sm" style="padding:13px 16px;flex:0 0 auto" onclick='lookupBarcode(document.getElementById("bc_manual").value.trim(),${cx})'>Cerca</button>
    </div></label>
    <div class="note" style="margin-top:12px">📡 Richiede internet. I dati vengono da <b>Open Food Facts</b> (database collaborativo): controlla sempre i valori e correggili se serve. I prodotti che salvi vengono riconosciuti anche offline.</div>`);
  try{
    const ZX=await loadZXing();
    const st=document.getElementById('bc_status'); if(!st)return; // modale chiuso
    st.textContent='Inquadra il codice…';

function guessCat(p){
  const t=((p.categories_tags||[]).join(' ')).toLowerCase();
  if(/dairy|milk|yogurt|cheese|latt|formagg/.test(t))return 'dairy';
  if(/fruit|frut/.test(t))return 'fruit';
  if(/vegetable|verd|legum/.test(t))return 'veg';
  const n=p.nutriments||{};const pr=+n.proteins_100g||0,ca=+n.carbohydrates_100g||0,fa=+n.fat_100g||0;
  if(fa>=pr&&fa>=ca&&fa>0)return 'fat'; if(pr>=ca&&pr>0)return 'pro'; return 'carb';
}
function mapAllergens(p){
  const t=((p.allergens_tags||[]).join(' ')).toLowerCase();const out=[];
  const map={milk:'lattosio',gluten:'glutine',egg:'uova',fish:'pesce',crustacean:'crostacei','nuts':'frutta a guscio',soy:'soia',peanut:'arachidi'};
  Object.keys(map).forEach(k=>{if(t.includes(k)&&out.indexOf(map[k])<0)out.push(map[k]);});return out;
}
async function lookupBarcode(code,ctx){
  if(!code){toast('Inserisci o inquadra un codice');return;}
  // 1) già salvato? riconoscimento offline
  const local=FOODS.find(f=>f.bc===code);
  if(local){closeModal();toast('Prodotto riconosciuto ✓');editFoodValues(local.n,ctx);return;}
  openModal(`<h3>🔎 Cerco il prodotto…</h3><div class="msub">Codice ${code}</div><div style="text-align:center;padding:28px"><span class="spin"></span> Consulto Open Food Facts…</div>`);
  try{
    const r=await fetch('https://world.openfoodfacts.org/api/v2/product/'+encodeURIComponent(code)+'.json?fields=product_name,brands,nutriments,categories_tags,allergens_tags,serving_quantity,serving_size');
    const data=await r.json();
    if(!data||data.status!==1||!data.product){openModal(bcNotFound(code,ctx));return;}
    const p=data.product, n=p.nutriments||{};
    let kcal=n['energy-kcal_100g']; if(kcal==null&&n['energy_100g']!=null)kcal=n['energy_100g']/4.184;
    const por=Math.round(parseFloat(p.serving_quantity)||0);     // porzione in grammi
    const preset={
      n:([p.brands,p.product_name].filter(Boolean).join(' ').trim())||('Prodotto '+code),
      k:Math.round(kcal||kcalFromMacros(+n.proteins_100g||0,+n.carbohydrates_100g||0,+n.fat_100g||0)),
      p:Math.round((+n.proteins_100g||0)*10)/10, c:Math.round((+n.carbohydrates_100g||0)*10)/10, f:Math.round((+n.fat_100g||0)*10)/10,
      cat:guessCat(p), alg:mapAllergens(p), bc:code
    };
    if(por>0)preset.por=por;
    if(p.serving_size)preset.porl=('porzione '+p.serving_size).slice(0,28);
    editFoodValues(null,ctx,preset);
  }catch(e){ openModal(bcNotFound(code,ctx,true)); }
}

// ridimensiona l'immagine lato client per ridurre costi/token
function downscaleImage(file,max,q){
  return new Promise((res,rej)=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      let w=img.width,h=img.height; const sc=Math.min(1,max/Math.max(w,h)); w=Math.round(w*sc); h=Math.round(h*sc);
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      let durl; try{durl=cv.toDataURL('image/jpeg',q);}catch(e){URL.revokeObjectURL(url);return rej(new Error('immagine non valida'));}
      URL.revokeObjectURL(url);
      res({data:durl.split(',')[1],mime:'image/jpeg'});
    };
    img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error('immagine non valida'));};
    img.src=url;
  });
}
async function analyzePlate(data,mime,key){
  const sys='Sei un nutrizionista esperto. Analizzi foto di piatti di cibo e stimi ingredienti, grammature e calorie in modo realistico. Rispondi SEMPRE e SOLO con un oggetto JSON valido, senza testo attorno e senza markdown.';
  const prompt='Analizza questa foto di un piatto. Identifica il piatto e gli ingredienti visibili con le grammature stimate a occhio. Rispondi con questo JSON (numeri, in italiano): {"piatto":"nome breve","ingredienti":[{"nome":"...","g":numero,"kcal":numero,"p":numero,"c":numero,"f":numero}],"totale":{"kcal":numero,"p":numero,"c":numero,"f":numero},"nota":"1 frase con eventuali assunzioni"}. Se non è cibo, usa ingredienti vuoto.';
  let r;
  try{
    r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',
      headers:{'content-type':'application/json','authorization':'Bearer '+key},
      body:JSON.stringify({model:groqVModel(),max_tokens:1024,temperature:0.3,
        messages:[{role:'system',content:sys},{role:'user',content:[{type:'text',text:prompt},{type:'image_url',image_url:{url:'data:'+mime+';base64,'+data}}]}]})});
  }catch(e){return {error:'Niente connessione'};}
  if(!r.ok){ if(r.status===401)return{error:'Chiave Groq non valida'}; if(r.status===429)return{error:'Troppe richieste, riprova tra poco'}; if(r.status===404||r.status===400)return{error:'Modello foto non valido: controlla il nome nelle Impostazioni'}; return {error:'Errore AI ('+r.status+')'}; }
  const j=await r.json();
  let txt=((j.choices&&j.choices[0]&&j.choices[0].message&&j.choices[0].message.content)||'').trim();
  const s=txt.indexOf('{'), e=txt.lastIndexOf('}'); if(s>=0&&e>s)txt=txt.slice(s,e+1);
  let obj; try{obj=JSON.parse(txt);}catch(err){return {error:'Non ho capito la foto, riprova'};}
  if(!obj.ingredienti||!obj.ingredienti.length)return {error:'Non ho riconosciuto cibo nella foto'};
  return obj;
}

/* riadatta gli alimenti NON bloccati del pasto per centrare il target */
function rebalanceMeal(d,mi,changedFi){
  const meal=MENU.days[d].meals[mi];if(meal.cheat)return;
  // target del pasto = quota del giorno
  const tgt=dayTarget(d);
  const hasCheat=S.cheat.enabled&&S.cheat.day===d;
  let eff={p:tgt.p,c:tgt.c,f:tgt.f};
  if(hasCheat){eff={p:tgt.p-S.cheat.p,c:tgt.c-S.cheat.c,f:tgt.f-S.cheat.f};}
  const mealW=mealSplit(S.meals);
  let wsum=0;mealW.forEach((w,i)=>{if(!(hasCheat&&i===S.cheat.mealIndex))wsum+=w;});
  const w=(mealW[mi]||1/S.meals)/wsum;
  let need={p:eff.p*w,c:eff.c*w,f:eff.f*w};
  // sottrai contributi bloccati
  meal.foods.forEach((it,i)=>{if(it.locked||i===changedFi){const m=foodMacros(it);need.p-=m.p;need.c-=m.c;need.f-=m.f;}});
  // distribuisci sul resto per categoria
  meal.foods.forEach((it,i)=>{
    if(it.locked||i===changedFi)return;
    const ff=findFood(it.food);if(!ff)return;
    let g=it.g;
    if(ff.cat==='carb'&&ff.c>0)g=round5(Math.max(10,need.c/(ff.c/100)));
    else if(ff.cat==='pro'&&ff.p>0)g=round5(Math.max(20,need.p/(ff.p/100)));
    else if(ff.cat==='fat'&&ff.f>0)g=round5(Math.max(5,Math.min(25,need.f/(ff.f/100))));
    it.g=Math.min(g,450);
  });
}

let shopDone=(()=>{try{return JSON.parse(localStorage.getItem('macroai_shop'))||{}}catch(e){return {}}})();
function buildShop(){
  const agg={};
  MENU.days.forEach(day=>day.meals.forEach(meal=>meal.foods.forEach(it=>{
    if(it.food==='__cheat__')return;
    const ff=findFood(it.food);if(!ff)return;
    if(!agg[it.food])agg[it.food]={g:0,cat:ff.cat};

function shopText(){

function printShop(){document.getElementById('printArea').innerHTML='<h1>Lista della spesa — '+S.name+'</h1><pre style="font-family:inherit;white-space:pre-wrap;font-size:13px">'+shopText().split('\n').slice(2).join('\n')+'</pre>';setTimeout(()=>window.print(),120);}

let diarySel=todayKey();        // data selezionata nel diario (YYYY-MM-DD)

function diaryAll(){try{return JSON.parse(localStorage.getItem('macroai_diary'))||{}}catch(e){return {}}}
function diarySave(d){localStorage.setItem('macroai_diary',JSON.stringify(d))}
function diaryGet(k){return diaryAll()[k]||{entries:[]}}
function diaryAddEntry(k,entry){const all=diaryAll();(all[k]=all[k]||{entries:[]}).entries.push(entry);diarySave(all);}
function diaryRemove(k,i){const all=diaryAll();if(all[k]){all[k].entries.splice(i,1);diarySave(all);}renderDiario();}

function weightAll(){try{return JSON.parse(localStorage.getItem('macroai_weight'))||{}}catch(e){return {}}}
function weightSave(w){localStorage.setItem('macroai_weight',JSON.stringify(w))}
function weightGet(k){return weightAll()[k]||null}
function setWeight(k,v){const w=weightAll();if(v>0)w[k]=v;else delete w[k];weightSave(w);renderDiario();}

// lunedì della settimana che contiene la data k
function mondayOf(k){const d=new Date(k+'T12:00:00');const off=(d.getDay()+6)%7;d.setDate(d.getDate()-off);return d;}
function fmtKey(d){return d.toISOString().slice(0,10);}
function fmtIt(k){const d=new Date(k+'T12:00:00');return DAYS[(d.getDay()+6)%7]+' '+d.getDate()+'/'+(d.getMonth()+1);}
// media peso della settimana (Lun-Dom) che contiene k
function weeklyWeight(k){const mon=mondayOf(k);const W=weightAll();let vals=[];for(let i=0;i<7;i++){const dk=fmtKey(new Date(mon.getFullYear(),mon.getMonth(),mon.getDate()+i));if(W[dk]!=null)vals.push(W[dk]);}
  if(!vals.length)return null;return {avg:+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1),n:vals.length,first:vals[0],last:vals[vals.length-1]};}

function diaryTotals(k){let t={k:0,p:0,c:0,f:0};diaryGet(k).entries.forEach(e=>{t.k+=e.k;t.p+=e.p;t.c+=e.c;t.f+=e.f;});return {k:Math.round(t.k),p:Math.round(t.p),c:Math.round(t.c),f:Math.round(t.f)};}

// segna un pasto del menù come mangiato (lo copia nel diario di oggi)
// serie peso ordinata per data: [{k, v}]
function weightSeries(){
  const W=weightAll();
  return Object.keys(W).sort().map(k=>({k,v:W[k]}));
}
// grafico andamento peso (SVG, ultimi 30 punti) — nessuna libreria, funziona offline
function weightChart(){
  const all=weightSeries();
  if(all.length<2) return `<div class="note" style="margin-top:10px">📈 Aggiungi almeno <b>2 pesate</b> in giorni diversi per vedere il grafico dell’andamento.</div>`;
  const s=all.slice(-30);
  const W=320, H=150, padL=34, padR=10, padT=14, padB=24;
  const vs=s.map(p=>p.v);
  let min=Math.min(...vs), max=Math.max(...vs);
  if(max-min<1){min-=0.5;max+=0.5;} // evita linea piatta
  const dates=s.map(p=>new Date(p.k+'T12:00:00').getTime());
  const t0=dates[0], t1=dates[dates.length-1], span=Math.max(1,t1-t0);
  const X=t=>padL+(t-t0)/span*(W-padL-padR);
  const Y=v=>padT+(max-v)/(max-min)*(H-padT-padB);
  const pts=s.map((p,i)=>({x:X(dates[i]),y:Y(p.v),v:p.v}));
  const line=pts.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ');
  const area=`M${pts[0].x.toFixed(1)} ${(H-padB)} `+pts.map(p=>'L'+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ')+` L${pts[pts.length-1].x.toFixed(1)} ${(H-padB)} Z`;
  const yMid=(min+max)/2;
  const gl=v=>`<line x1="${padL}" y1="${Y(v).toFixed(1)}" x2="${W-padR}" y2="${Y(v).toFixed(1)}" stroke="#262626" stroke-width="1"/><text x="${padL-5}" y="${(Y(v)+3).toFixed(1)}" fill="#8a8a8a" font-size="9" text-anchor="end">${v.toFixed(1)}</text>`;
  const dots=pts.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.6" fill="#34d399"/>`).join('');
  const fmtD=t=>{const d=new Date(t);return d.getDate()+'/'+(d.getMonth()+1);};
  const trend=s[s.length-1].v-s[0].v;
  const trendC=trend<0?'var(--accent)':trend>0?'var(--danger)':'var(--muted)';
  return `<div style="margin-top:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:12px;color:var(--muted);font-weight:600">📈 Andamento (${s.length} pesate)</span>
      <span style="font-size:12px;font-weight:700;color:${trendC}">${trend>=0?'+':''}${trend.toFixed(1)} kg</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;background:var(--card2);border-radius:12px">
      <defs><linearGradient id="wgrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#34d399" stop-opacity="0.35"/><stop offset="100%" stop-color="#34d399" stop-opacity="0"/></linearGradient></defs>
      ${gl(max)}${gl(yMid)}${gl(min)}
      <path d="${area}" fill="url(#wgrad)"/>
      <path d="${line}" fill="none" stroke="#34d399" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
      <text x="${padL}" y="${H-7}" fill="#8a8a8a" font-size="9" text-anchor="start">${fmtD(t0)}</text>
      <text x="${W-padR}" y="${H-7}" fill="#8a8a8a" font-size="9" text-anchor="end">${fmtD(t1)}</text>
    </svg></div>`;
}

// chiama l'API di Claude (modalità avanzata opzionale, richiede internet + chiave dell'utente)
const GROQ_MODEL_DEFAULT='llama-3.3-70b-versatile';
const GROQ_VMODEL_DEFAULT='meta-llama/llama-4-scout-17b-16e-instruct';
function groqModel(){return localStorage.getItem('macroai_model')||GROQ_MODEL_DEFAULT;}
function groqVModel(){return localStorage.getItem('macroai_vmodel')||GROQ_VMODEL_DEFAULT;}
function groqErr(status){
  if(status===401)return '🔑 La chiave Groq non sembra valida. Controllala nelle Impostazioni → AI avanzata.';
  if(status===429)return '⏳ Troppe richieste (limite Groq). Riprova tra poco.';
  if(status===404||status===400)return '⚠️ Modello Groq non disponibile: controlla il nome del modello nelle Impostazioni → AI avanzata (i modelli Groq cambiano nel tempo).';
  return '⚠️ L’AI non risponde (errore '+status+'). Le funzioni del menù restano disponibili offline.';
}
async function askClaude(t,key){
  const sys=coachSystemPrompt();
  // storico: ultimi messaggi, ripuliti dall'HTML (formato OpenAI/Groq)
  const hist=chatHist.slice(-11,-1).map(m=>({role:m.role==='user'?'user':'assistant',
    content:String(m.txt).replace(/<[^>]+>/g,'').trim()})).filter(m=>m.content);
  const messages=[{role:'system',content:sys}].concat(hist,[{role:'user',content:t}]);
  try{
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'content-type':'application/json','authorization':'Bearer '+key},
      body:JSON.stringify({model:groqModel(),max_tokens:1024,temperature:0.6,messages})
    });
    if(!r.ok)return groqErr(r.status);
    const data=await r.json();
    const txt=((data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'').trim();
    return txt || 'Non ho una risposta in questo momento, riprova.';
  }catch(e){
    return '📡 Niente connessione: l’AI avanzata richiede internet. Posso comunque gestire menù, spesa, ricette, diario e peso anche offline!';
  }
}
function coachSystemPrompt(){
  let p='Sei l’AI coach nutrizionale dell’app "Macro AI". Rispondi in italiano, in modo amichevole, conciso e pratico. ';
  p+='Sei un assistente per alimentazione, allenamento e benessere generale: puoi rispondere anche a domande libere. ';
  p+='Non sei un medico: per problemi clinici consiglia di rivolgersi a un professionista. ';
  if(S){
    p+=`\n\nProfilo utente: nome ${S.name||'utente'}, ${S.trainingDays} allenamenti/settimana, ${S.meals} pasti al giorno. `;
    p+=`Macro allenamento P${S.macros.train.p} C${S.macros.train.c} G${S.macros.train.f} (${kcalFromMacros(S.macros.train.p,S.macros.train.c,S.macros.train.f)} kcal); `;
    p+=`riposo P${S.macros.rest.p} C${S.macros.rest.c} G${S.macros.rest.f}. `;
    if(S.allergies)p+=`Allergie/intolleranze: ${S.allergies}. `;
    if(S.dislikes)p+=`Cibi non graditi: ${S.dislikes}. `;
    if(S.cheat&&S.cheat.enabled)p+=`Pasto sgarro: ${DAYS[S.cheat.day]} (${S.cheat.desc||'libero'}). `;
  }
  p+='\n\nL’app sa già fare da sola (suggeriscilo se pertinente): rigenerare menù, cambiare alimenti, lista della spesa, ricette anche per friggitrice ad aria, diario alimentare, grafico del peso, calcolatore macro, scarica/stampa. ';
  p+='Tu non puoi premere i pulsanti: se serve un’azione, spiega all’utente cosa scrivere o dove toccare. Mantieni le risposte brevi (massimo ~150 parole) salvo richiesta esplicita.';
  return p;
}

// parser: trova giorno e pasto citati
function parseDay(t){for(let i=0;i<7;i++){if(t.includes(DAYS[i].toLowerCase())||t.includes(DSHORT[i].toLowerCase()))return i;}if(t.includes('oggi'))return curDay;if(t.includes('domani'))return (curDay+1)%7;return -1;}
function parseMeal(t){const names=S.mealNames.map(n=>n.toLowerCase());for(let i=0;i<names.length;i++){if(t.includes(names[i]))return i;}if(t.includes('colaz'))return names.findIndex(n=>n.includes('colaz'));if(t.includes('pranzo'))return names.findIndex(n=>n.includes('pranzo'));if(t.includes('cena'))return names.findIndex(n=>n.includes('cena'));return -1;}

function coachReply(raw){
  const t=raw.toLowerCase();
  // SALUTI
  if(/^(ciao|ehi|hey|buongiorno|buonasera|salve)\b/.test(t))return `Ciao ${S.name}! 👋 Come posso aiutarti col tuo menù? Posso rigenerare pasti, cambiare alimenti, fare la lista della spesa o suggerirti ricette.`;
  if(/grazie|perfetto|ottimo|bene/.test(t)&&t.length<25)return 'Di niente! 💪 Sono qui se ti serve altro.';

  // STAMPA / DOWNLOAD
  if(/(scarica|download|esporta|salva)/.test(t)&&/menu|menù/.test(t)||/(scarica|download|esporta)/.test(t)&&!/spesa/.test(t)){downloadMenu();return '⬇️ Sto scaricando il tuo menù settimanale in formato testo. Lo trovi nei download!';}
  if(/stampa/.test(t)){if(/spesa/.test(t)){go('shop');setTimeout(printShop,300);return '🖨️ Apro la stampa della lista della spesa.';}printMenu();return '🖨️ Apro l’anteprima di stampa del menù. Da lì puoi anche salvarlo come PDF!';}

  // LISTA SPESA
  if(/spesa|comprare|comprato|acquist|supermercat/.test(t)){go('shop');return '🛒 Ecco la <b>lista della spesa</b> con tutto quello che serve per il menù della settimana, diviso per reparto. La trovi nella scheda Spesa!';}

  // RICETTE
  if(/ricett|cucinar|friggitrice|air ?fryer|forno/.test(t)){if(/friggitrice|air ?fryer/.test(t)){recipeFilter='af';}go('recipes');renderRecipes();return /friggitrice|air ?fryer/.test(t)?'🌀 Ecco le ricette per la <b>friggitrice ad aria</b> con i tuoi alimenti! Le trovi nella scheda Ricette.':'📖 Ti ho aperto le <b>ricette</b> consigliate con gli alimenti del tuo menù — incluse quelle per friggitrice ad aria!';}

  // NON MI PIACE X
  let mdis=t.match(/non mi piac\w*\s+(?:il |la |lo |i |le |gli |l')?([a-zàèéìòù ]+)/);
  if(mdis||/togli|elimina|rimuovi|odio|detesto/.test(t)){
    let term=mdis?mdis[1].trim():(t.match(/(?:togli|elimina|rimuovi|odio|detesto)\s+(?:il |la |lo |l')?([a-zàèéìòù ]+)/)||[])[1];
    if(term){term=term.trim();
      S.dislikes=(S.dislikes?S.dislikes+', ':'')+term;save();
      generateWeek();renderMenu();
      return `Capito 👍 Ho aggiunto <b>${term}</b> agli alimenti da evitare e ho rigenerato tutto il menù senza usarlo, mantenendo i tuoi macro. Lo vedi nella scheda Menù!`;
    }
  }
  // ALLERGIA
  let malg=t.match(/(?:sono allergic\w*|allergia|intoller\w*)\s*(?:a|al|alla|ai|alle|agli)?\s*([a-zàèéìòù ]+)/);
  if(malg&&malg[1]){const term=malg[1].trim();S.allergies=(S.allergies?S.allergies+', ':'')+term;save();generateWeek();renderMenu();return `Registrato ⚠️ Ho segnato l’allergia a <b>${term}</b> e rigenerato il menù escludendo questi alimenti. Stai tranquillo!`;}

  // PIÙ / MENO MACRO
  if(/più protein|piu protein|aumenta.*protein|alza.*protein/.test(t)){S.macros.train.p+=15;S.macros.rest.p+=15;save();generateWeek();renderMenu();return '💪 Ho aumentato le proteine di 15g al giorno e riadattato tutto il menù. Le kcal si aggiornano in automatico!';}
  if(/meno carb|riduci.*carb|abbassa.*carb/.test(t)){S.macros.train.c=Math.max(50,S.macros.train.c-30);S.macros.rest.c=Math.max(50,S.macros.rest.c-30);save();generateWeek();renderMenu();return '📉 Ho ridotto i carboidrati di 30g al giorno e rigenerato il menù mantenendo l’equilibrio.';}
  if(/più carb|piu carb|aumenta.*carb/.test(t)){S.macros.train.c+=30;S.macros.rest.c+=30;save();generateWeek();renderMenu();return '🍚 Carboidrati aumentati di 30g/giorno. Menù aggiornato!';}

  // RIGENERA
  const day=parseDay(t),meal=parseMeal(t);
  if(/rigener|cambia|nuovo|diverso|varia|altro menu|altro menù/.test(t)){
    if(/settiman|tutto|intero menu|intero menù/.test(t)){regenAll();go('menu');return '🔁 Fatto! Ho rigenerato <b>tutta la settimana</b> con un menù vario che rispetta i tuoi macro.';}
    if(day>=0&&meal>=0){regenMeal(day,meal);curDay=day;go('menu');return `🔄 Ho rigenerato <b>${S.mealNames[meal]} di ${DAYS[day]}</b> mantenendo i macro del pasto.`;}
    if(meal>=0){regenMeal(curDay,meal);go('menu');return `🔄 Ho rigenerato <b>${S.mealNames[meal]}</b> di ${DAYS[curDay]}.`;}
    if(day>=0){regenDay(day);curDay=day;go('menu');return `🔄 Ho rigenerato tutto il <b>${DAYS[day]}</b> con pasti nuovi e vari.`;}
    if(/oggi/.test(t)){regenDay(curDay);go('menu');return '🔄 Giorno rigenerato!';}
    regenAll();go('menu');return '🔁 Ho rigenerato il menù settimanale rispettando i tuoi macro!';
  }
  // CAMBIA SINGOLO ALIMENTO citato — solo se c'è intenzione di sostituzione
  if(/cambi|sostitu|modific|alternativ|al posto|invece d|non voglio/.test(t)){
    for(const f of FOODS){if(t.includes(f.n.toLowerCase())){
      const alts=allowed(f.cat).filter(a=>a.n!==f.n).slice(0,3).map(a=>a.n);
      return `Vuoi cambiare <b>${f.n}</b>? 👀 Apri la scheda Menù e tocca ✏️ accanto all’alimento: ti propongo alternative come <b>${alts.join(', ')}</b> e, se non ti vanno, puoi cercare un prodotto e riadatto in automatico gli altri alimenti per centrare i macro.`;
    }}
  }

  // MACRO / INFO
  if(/macro|calorie|kcal|quanto|obiettiv/.test(t)){const tg=dayTarget(curDay);const g=dayMacros(curDay);return `📊 Oggi (${DAYS[curDay]} — ${tg.label}):\n<b>Obiettivo:</b> ${kcalFromMacros(tg.p,tg.c,tg.f)}kcal · P${tg.p} C${tg.c} G${tg.f}\n<b>Nel menù:</b> ${g.k}kcal · P${g.p} C${g.c} G${g.f}\n\nLe calorie le calcolo sempre in automatico dai macro!`;}
  if(/sgarro|cheat|pasto liber/.test(t)){if(S.cheat.enabled)return `🍕 Il tuo pasto sgarro è <b>${DAYS[S.cheat.day]}</b> (${S.mealNames[S.cheat.mealIndex]}): ${S.cheat.desc||'pasto libero'}. È solo quel pasto e conto comunque i macro (P${S.cheat.p} C${S.cheat.c} G${S.cheat.f}). Puoi modificarlo dalla scheda Menù o dalle Impostazioni.`;return 'Al momento non hai un pasto sgarro impostato. Puoi attivarlo dalle Impostazioni ⚙️ e scegliere giorno, pasto e di cosa è fatto!';}
  if(/calcola.*macro|non so.*macro|quanti.*dovrei|stima.*macro|aiuto.*macro/.test(t)){openMacroCalc('settings');return '🧮 Apro il calcolatore: con pochi dati (peso, altezza, età, attività, obiettivo) stimo i tuoi macro. Poi premi Salva!';}
  if(/acqua|bere|idrataz/.test(t)){go('menu');return '💧 Trovi il tracker dell’acqua in alto nella scheda Menù (giorno di oggi): tocca + ogni bicchiere da 250 ml. Obiettivo 2 L!';}
  if(/\bfoto\b|scatta|fotograf|piatto.*calor|analizza.*piatto/.test(t)){photoMeal();return '📸 Ho aperto <b>Foto al piatto</b>: scatta una foto, stimo ingredienti e calorie e li aggiungo al pasto che scegli (contano nel totale della giornata).';}
  if(/\bdiario\b|ho mangiato|registra.*pasto|cosa ho mangiato|tracci/.test(t)){go('diario');return '📔 Ti ho aperto il <b>Diario</b>: qui registri cosa mangi e vedi i macro rimanenti della giornata. Sul Menù puoi toccare <b>✓ Mangiato</b>, oppure usa <b>📸 Foto al piatto</b> per stimare le kcal da una foto!';}
  if(/\bpeso\b|peserm|quanto peso|pesata|dimagri.*track|media.*peso/.test(t)){go('diario');const wk=weeklyWeight(todayKey());return '⚖️ Apri il Diario per segnare il peso del giorno.'+(wk?` La tua media di questa settimana è <b>${wk.avg} kg</b> (${wk.n} pesate).`:' Aggiungi qualche pesata e calcolo la media settimanale automaticamente.');}
  if(/impostazion|settings|profilo|modifica.*macro|cambia.*macro/.test(t)){openSettings();return '⚙️ Ti ho aperto le Impostazioni: qui puoi cambiare macro, pasti, sgarro, allergie e cibi che non ti piacciono. Tutto ciò che hai impostato all’inizio!';}
  if(/aiuto|help|cosa puoi|come funzion/.test(t))return 'Ecco cosa posso fare per te 🤖:\n• <b>“rigenera lunedì / la cena / la settimana”</b>\n• <b>“non mi piace il tofu”</b> → lo tolgo da tutto\n• <b>“sono allergico al lattosio”</b>\n• <b>“più proteine” / “meno carboidrati”</b>\n• <b>“lista della spesa”</b> · <b>“ricette friggitrice ad aria”</b>\n• <b>“scarica/stampa il menù”</b> · <b>“segna il peso”</b>\n• Domande di nutrizione (proteine, carboidrati, digiuno, integratori…)\nProva pure!';

  // BASE DI CONOSCENZA NUTRIZIONALE (offline)
  const kb=nutritionKB(t);
  if(kb)return kb;

  // non gestito localmente → l'AI avanzata (se attiva) risponderà

}

// risposte nutrizionali offline su domande frequenti
function nutritionKB(t){
  if(/quante? protein|fabbisogno protei|grammi.*protein/.test(t))return '🥩 Per chi si allena, in genere si consigliano <b>1,6–2,2 g di proteine per kg</b> di peso al giorno, distribuite tra i pasti. Fonti ottime: pollo, tacchino, pesce, uova, albume, yogurt greco, legumi, tofu. Le tue le trovi nelle Impostazioni e le rispetto nel menù!';
  if(/cosa.*(carboidrat|carbo)|a cosa servono.*carbo|perché.*carbo/.test(t))return '🍚 I <b>carboidrati</b> sono la principale fonte di energia, utili soprattutto attorno all’allenamento. Meglio fonti integrali e a basso indice: riso, avena, patate dolci, legumi, frutta. 4 kcal per grammo.';
  if(/cosa.*grass|a cosa servono.*grass|perché.*grass/.test(t))return '🥑 I <b>grassi</b> servono a ormoni e assorbimento delle vitamine. Privilegia quelli “buoni”: olio EVO, avocado, frutta secca, pesce azzurro. Sono densi: 9 kcal per grammo, quindi attenzione alle quantità.';
  if(/perdere peso|dimagri|deficit|perdere grasso|definizione/.test(t))return '📉 Per dimagrire serve un <b>deficit calorico</b> moderato (circa 300–500 kcal sotto il mantenimento), proteine alte per preservare i muscoli, e costanza. Usa il <b>calcolatore macro</b> con obiettivo “Dimagrire” e segui il menù — traccia il peso nel Diario per vedere l’andamento!';
  if(/aumentare massa|mettere massa|massa muscolare|bulk|crescere/.test(t))return '💪 Per aumentare massa: leggero <b>surplus calorico</b> (+10%), proteine 1,8–2,2 g/kg, carboidrati adeguati attorno all’allenamento e allenamento progressivo. Imposta l’obiettivo “Aumentare massa” nel calcolatore macro.';
  if(/pre.?(workout|allenament)|prima.*allena|cosa mangiare prima/.test(t))return '⏱️ <b>Prima dell’allenamento</b> (1–2 h): carboidrati + un po’ di proteine, pochi grassi e fibre per digerire bene. Es: riso e pollo, oppure pane e bresaola, o avena e yogurt.';
  if(/post.?(workout|allenament)|dopo.*allena|cosa mangiare dopo/.test(t))return '🔁 <b>Dopo l’allenamento</b>: proteine (20–40 g) + carboidrati per recuperare. Es: pollo e riso, o yogurt greco e frutta. Non serve l’“finestra anabolica” stretta: conta il totale giornaliero.';
  if(/digiuno intermittente|intermittent|16.?8|salt.*colazione/.test(t))return '🕑 Il <b>digiuno intermittente</b> (es. 16/8) è solo un modo di distribuire i pasti: funziona se ti aiuta a rispettare i macro, ma non è magico. Conta sempre il totale giornaliero. Puoi impostare meno pasti nelle Impostazioni.';
  if(/creatina/.test(t))return '🔬 La <b>creatina monoidrato</b> (3–5 g al giorno) è tra gli integratori più studiati: aiuta forza e performance. Va presa con costanza, l’orario non è cruciale. (Consiglio generale, non medico.)';
  if(/proteine in polvere|whey|proteine del siero|integratore.*protein/.test(t))return '🥤 Le <b>proteine in polvere</b> (whey o vegetali) sono solo un modo comodo per arrivare al fabbisogno proteico: non obbligatorie se lo raggiungi col cibo. Utili nello spuntino o post-workout.';
  if(/fibr/.test(t))return '🌾 Le <b>fibre</b> (verdura, frutta, legumi, integrali) migliorano digestione e sazietà. Obiettivo indicativo 25–30 g al giorno. Nel menù inserisco sempre verdura e fonti integrali.';
  if(/zuccher/.test(t))return '🍬 Meglio limitare gli <b>zuccheri aggiunti</b>, ma quelli della frutta vanno benissimo. Rientrano comunque nei carboidrati: se ci stanno nei tuoi macro, va bene anche un dolce ogni tanto (vedi pasto sgarro!).';
  if(/alcol|alcool|birra|vino/.test(t))return '🍷 L’<b>alcol</b> dà 7 kcal/g, non nutre e può rallentare recupero e definizione. Se lo bevi, conteggialo (puoi usare la “voce rapida” nel Diario) e tienilo occasionale.';
  if(/quanta acqua|quanto bere|litri.*acqua/.test(t))return '💧 Indicativamente <b>30–35 ml per kg</b> di peso al giorno (di più se ti alleni o fa caldo). Trovi il tracker dell’acqua nel Menù con obiettivo 2 L.';
  if(/quante.*calorie|fabbisogno calor|quante kcal/.test(t))return '🔢 Non ti chiedo le calorie: le <b>calcolo dai macro</b> (4 kcal/g per proteine e carboidrati, 9 kcal/g per i grassi). Se non conosci i tuoi, usa il <b>calcolatore macro</b> nelle Impostazioni.';
  return null;
}
